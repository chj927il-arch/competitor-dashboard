name: 경쟁사 크롤링 (매일 자동)

# 매일 한국시간 오전 8시(=UTC 23시)에 자동 실행 + GitHub에서 수동 실행도 가능
on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch: {}

permissions:
  contents: write   # 크롤링 결과(public/data)를 저장소에 다시 커밋하기 위해 필요

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 패키지 설치
        run: npm ci

      - name: Chromium(브라우저) 준비
        run: npx puppeteer browsers install chrome

      - name: 크롤링 + Gemini 분석 실행
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node crawl.js

      - name: 결과를 저장소에 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data
          if git diff --cached --quiet; then
            echo "변경된 데이터 없음 — 커밋 생략"
          else
            git commit -m "데이터 자동 갱신 ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          fi
