<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>경쟁사 모니터링 · 마케팅 인텔리전스</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  :root {
    --font: 'Pretendard','Pretendard Variable','Apple SD Gothic Neo',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    --mono: 'SF Mono','JetBrains Mono','Cascadia Code',ui-monospace,monospace;
    --radius: 18px; --radius-sm: 12px; --radius-xs: 9px;
  }
  [data-theme="dark"] {
    --bg: #07080c; --bg-2: #0a0b11;
    --glass: rgba(255,255,255,.035); --glass-strong: rgba(255,255,255,.055);
    --hair: rgba(255,255,255,.08); --hair-strong: rgba(255,255,255,.14);
    --text: #f3f5fb; --text-2: #b9c0d4; --muted: #767e96; --faint: #525a72;
    --accent: #8b8cf9; --accent-2: #c084fc;
    --accent-grad: linear-gradient(135deg,#7c7ef8,#c084fc);
    --accent-soft: rgba(124,126,248,.14);
    --rose: #fb7185; --amber: #fbbf24; --emerald: #34d399;
    --rose-soft: rgba(251,113,133,.13); --amber-soft: rgba(251,191,36,.13); --emerald-soft: rgba(52,211,153,.13);
    --shadow: 0 24px 60px -18px rgba(0,0,0,.7);
    --card-shadow: 0 1px 0 rgba(255,255,255,.04) inset, 0 18px 40px -22px rgba(0,0,0,.8);
    --glow: radial-gradient(900px 520px at 75% -8%, rgba(124,126,248,.18), transparent 60%), radial-gradient(720px 440px at 8% 4%, rgba(192,132,252,.10), transparent 55%);
    --dot: rgba(255,255,255,.028);
  }
  [data-theme="light"] {
    --bg: #f4f5f9; --bg-2: #eef0f6;
    --glass: rgba(255,255,255,.75); --glass-strong: #ffffff;
    --hair: rgba(15,20,40,.09); --hair-strong: rgba(15,20,40,.16);
    --text: #11142a; --text-2: #3a425e; --muted: #6b7488; --faint: #97a0b8;
    --accent: #5b5bd6; --accent-2: #9333ea;
    --accent-grad: linear-gradient(135deg,#5b5bd6,#9333ea);
    --accent-soft: rgba(91,91,214,.10);
    --rose: #e11d48; --amber: #c2740a; --emerald: #047857;
    --rose-soft: rgba(225,29,72,.09); --amber-soft: rgba(194,116,10,.10); --emerald-soft: rgba(4,120,87,.10);
    --shadow: 0 24px 60px -22px rgba(20,30,70,.22);
    --card-shadow: 0 1px 2px rgba(20,30,70,.05), 0 16px 36px -24px rgba(20,30,70,.22);
    --glow: radial-gradient(900px 520px at 78% -10%, rgba(91,91,214,.10), transparent 60%);
    --dot: rgba(20,30,70,.04);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { min-height: 100%; }
  body {
    background: var(--bg); color: var(--text); font-family: var(--font);
    font-size: 15px; line-height: 1.6; letter-spacing: -.003em;
    -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
    transition: background .3s, color .3s;
  }
  body::before { content: ''; position: fixed; inset: 0; z-index: -2; background: var(--glow); }
  body::after {
    content: ''; position: fixed; inset: 0; z-index: -2; pointer-events: none;
    background-image: radial-gradient(var(--dot) 1px, transparent 1px); background-size: 26px 26px;
    mask-image: radial-gradient(circle at 50% 30%, #000 30%, transparent 90%);
  }
  .num { font-variant-numeric: tabular-nums; font-feature-settings: "tnum" 1; }
  svg { display: block; }

  .app { display: flex; min-height: 100vh; }

  /* ── 사이드바 ── */
  .sidebar {
    width: 280px; flex-shrink: 0; padding: 24px 18px; position: sticky; top: 0; height: 100vh;
    display: flex; flex-direction: column; gap: 26px; overflow-y: auto;
    background: linear-gradient(180deg, var(--glass-strong), var(--glass));
    border-right: 1px solid var(--hair); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  }
  .brand { display: flex; align-items: center; gap: 12px; padding: 2px 6px; }
  .brand-logo { width: 42px; height: 42px; border-radius: 13px; background: var(--accent-grad); display: grid; place-items: center; color: #fff; font-weight: 800; font-size: 19px; box-shadow: 0 8px 22px -8px var(--accent); flex-shrink: 0; }
  .brand-title { font-size: 16px; font-weight: 750; letter-spacing: -.02em; line-height: 1.2; }
  .brand-sub { font-size: 11px; color: var(--muted); letter-spacing: .02em; margin-top: 2px; }

  .nav-label { font-size: 10.5px; font-weight: 700; color: var(--faint); letter-spacing: .12em; text-transform: uppercase; padding: 0 10px; margin-bottom: 9px; }
  .nav { display: flex; flex-direction: column; gap: 3px; }
  .nav-btn { display: flex; align-items: center; gap: 11px; padding: 10px 12px; border: 1px solid transparent; background: transparent; color: var(--text-2); font-family: var(--font); font-size: 14px; font-weight: 550; border-radius: var(--radius-xs); cursor: pointer; text-align: left; width: 100%; transition: all .16s; }
  .nav-btn:hover { background: var(--glass-strong); color: var(--text); }
  .nav-btn.active { background: var(--accent-soft); color: var(--text); border-color: var(--hair-strong); }
  .nav-btn .ic { color: var(--muted); display: inline-flex; }
  .nav-btn.active .ic { color: var(--accent); }

  .comp-list { display: flex; flex-direction: column; gap: 5px; }
  .comp-item { display: flex; align-items: center; gap: 10px; padding: 11px 12px; border-radius: var(--radius-xs); cursor: pointer; border: 1px solid transparent; transition: all .16s; }
  .comp-item:hover { background: var(--glass-strong); }
  .comp-item.active { background: var(--accent-soft); border-color: var(--hair-strong); }
  .comp-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; background: var(--accent); color: var(--accent); box-shadow: 0 0 10px 0 currentColor; }
  .cat-group { margin-bottom: 14px; }
  .cat-group + .cat-group { margin-top: 4px; }
  .cat-label { display: flex; align-items: center; gap: 8px; font-size: 11.5px; font-weight: 750; color: var(--text-2); letter-spacing: .03em; padding: 0 10px; margin: 4px 0 8px; }
  .cat-label::after { content: ''; flex: 1; height: 1px; background: var(--hair); }
  .sub-label { font-size: 10.5px; font-weight: 700; color: var(--faint); letter-spacing: .04em; padding: 0 10px; margin: 10px 0 5px; }
  .comp-empty { font-size: 12.5px; color: var(--faint); padding: 9px 12px; font-style: italic; border: 1px dashed var(--hair); border-radius: var(--radius-xs); margin: 2px 0; }
  .comp-item-disabled { cursor: default; }
  .comp-item-disabled:hover { background: transparent; }
  .comp-dot.dim { background: var(--faint); color: var(--faint); box-shadow: none; }
  .comp-pending { margin-left: auto; font-size: 10.5px; color: var(--faint); font-weight: 700; border: 1px solid var(--hair); padding: 2px 7px; border-radius: 20px; }
  .comp-name { font-size: 14px; font-weight: 650; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: -.01em; }

  .sidebar-foot { margin-top: auto; display: flex; flex-direction: column; gap: 11px; padding-top: 16px; border-top: 1px solid var(--hair); }
  .last-run { font-size: 12px; color: var(--muted); padding: 0 8px; line-height: 1.5; }
  .last-run b { color: var(--text-2); font-weight: 650; }
  .foot-actions { display: flex; gap: 8px; }

  .btn { padding: 9px 14px; border-radius: var(--radius-xs); border: 1px solid var(--hair-strong); background: var(--glass); color: var(--text-2); font-family: var(--font); font-size: 13px; font-weight: 650; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 7px; transition: all .16s; }
  .btn:hover { border-color: var(--accent); color: var(--text); background: var(--glass-strong); }
  .btn:active { transform: scale(.97); }
  .btn svg { width: 15px; height: 15px; }
  .btn-primary { background: var(--accent-grad); border-color: transparent; color: #fff; box-shadow: 0 10px 24px -10px var(--accent); }
  .btn-primary:hover { color: #fff; filter: brightness(1.08); }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .btn-block { flex: 1; }
  .btn-ico { padding: 9px 11px; }

  /* ── 본문 ── */
  .content { flex: 1; min-width: 0; padding: 36px 44px 60px; max-width: 1340px; }
  .page-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; margin-bottom: 30px; flex-wrap: wrap; }
  .page-title { font-size: 28px; font-weight: 800; letter-spacing: -.035em; line-height: 1.1; }
  .page-sub { font-size: 13.5px; color: var(--muted); margin-top: 6px; letter-spacing: -.01em; }
  .live-pill { display: inline-flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 650; color: var(--text-2); background: var(--glass); border: 1px solid var(--hair); padding: 7px 13px; border-radius: 30px; }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--emerald); animation: pulse 2.4s infinite; }
  @keyframes pulse { 0%{box-shadow:0 0 0 0 var(--emerald-soft)} 70%{box-shadow:0 0 0 7px transparent} 100%{box-shadow:0 0 0 0 transparent} }

  /* ── KPI 베이토 ── */
  .kpis { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 30px; }
  @media (max-width: 1080px) { .kpis { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 680px) { .kpis { grid-template-columns: 1fr; } }
  .kpi { position: relative; background: var(--glass); border: 1px solid var(--hair); border-radius: var(--radius); padding: 20px 22px; box-shadow: var(--card-shadow); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); overflow: hidden; transition: transform .18s, border-color .18s; }
  .kpi::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--hair-strong), transparent); }
  .kpi:hover { transform: translateY(-3px); border-color: var(--hair-strong); }
  .kpi-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .kpi-label { font-size: 12.5px; color: var(--muted); font-weight: 650; letter-spacing: -.01em; }
  .kpi-icon { width: 36px; height: 36px; border-radius: 11px; display: grid; place-items: center; border: 1px solid var(--hair); color: var(--accent); }
  .kpi-icon svg { width: 18px; height: 18px; }
  .kpi-value { font-size: 38px; font-weight: 800; line-height: 1; letter-spacing: -.04em; }
  .kpi-value small { font-size: 15px; font-weight: 650; color: var(--muted); letter-spacing: -.01em; margin-left: 3px; }
  .kpi-foot { font-size: 12px; color: var(--faint); margin-top: 10px; font-weight: 500; }
  .kpi.alert { border-color: var(--rose-soft); }
  .kpi.alert .kpi-value { color: var(--rose); }
  .kpi.accent .kpi-value { background: var(--accent-grad); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .spark { margin-top: 12px; }
  .spark svg { width: 100%; height: 26px; }
  .spark-empty { margin-top: 12px; font-size: 11px; color: var(--faint); font-weight: 500; }

  /* ── 카드 ── */
  .card { background: var(--glass); border: 1px solid var(--hair); border-radius: var(--radius); box-shadow: var(--card-shadow); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); overflow: hidden; }
  .detail-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 20px; padding: 26px 30px; border-bottom: 1px solid var(--hair); flex-wrap: wrap; background: linear-gradient(180deg, var(--glass-strong), transparent); }
  .detail-name { font-size: 25px; font-weight: 800; letter-spacing: -.03em; display: flex; align-items: center; gap: 12px; }
  .detail-meta { font-size: 12.5px; color: var(--muted); margin-top: 8px; letter-spacing: -.01em; }
  .detail-meta a { color: var(--accent); text-decoration: none; }
  .detail-meta a:hover { text-decoration: underline; }
  .urgency-block { text-align: right; }
  .urgency-reason { font-size: 12.5px; color: var(--muted); max-width: 300px; margin-top: 10px; line-height: 1.55; }

  .detail-body { padding: 28px 30px; }
  .summary-box { position: relative; background: var(--accent-soft); border: 1px solid var(--hair); border-radius: var(--radius-sm); padding: 20px 22px 20px 24px; font-size: 16.5px; font-weight: 550; line-height: 1.65; color: var(--text); margin-bottom: 30px; letter-spacing: -.01em; }
  .summary-box::before { content: ''; position: absolute; left: 0; top: 14px; bottom: 14px; width: 3px; border-radius: 3px; background: var(--accent-grad); }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  @media (max-width: 920px) { .grid-2 { grid-template-columns: 1fr; } }

  .col-head { display: flex; align-items: center; gap: 9px; font-size: 14px; font-weight: 750; letter-spacing: -.01em; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--hair); }
  .col-head .ic { display: inline-flex; color: var(--muted); }
  .col-count { margin-left: auto; font-size: 11.5px; font-weight: 700; color: var(--text-2); background: var(--glass-strong); border: 1px solid var(--hair); padding: 3px 10px; border-radius: 20px; }

  .item-list { display: flex; flex-direction: column; gap: 12px; }
  .item { position: relative; background: var(--glass); border: 1px solid var(--hair); border-radius: var(--radius-sm); padding: 16px 18px 16px 20px; transition: border-color .16s, transform .12s; }
  .item:hover { border-color: var(--hair-strong); transform: translateX(2px); }
  .item-link { display: block; text-decoration: none; color: inherit; cursor: pointer; }
  .item-link:hover { border-color: var(--accent); }
  .item::before { content: ''; position: absolute; left: 0; top: 12px; bottom: 12px; width: 3px; border-radius: 3px; background: var(--faint); }
  .item-high::before { background: var(--rose); }
  .item-medium::before { background: var(--amber); }
  .item-low::before { background: var(--emerald); }
  .item-promo::before { background: var(--amber); }
  .item-reco::before { background: var(--accent); }
  .item-head { display: flex; align-items: center; gap: 9px; margin-bottom: 7px; flex-wrap: wrap; }
  .item-title { font-size: 15.5px; font-weight: 700; line-height: 1.4; letter-spacing: -.015em; }
  .item-detail { font-size: 14.5px; color: var(--text-2); line-height: 1.62; letter-spacing: -.005em; }
  .ext { margin-left: auto; color: var(--muted); display: inline-flex; transition: color .16s, transform .16s; }
  .item-link:hover .ext { color: var(--accent); transform: translate(2px,-2px); }
  .item-period { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600; color: var(--muted); margin-top: 11px; background: var(--glass-strong); border: 1px solid var(--hair); padding: 4px 10px; border-radius: 7px; font-family: var(--mono); }
  .item-period svg { width: 13px; height: 13px; }

  .changes-block { margin-top: 30px; padding-top: 26px; border-top: 1px solid var(--hair); }

  /* ── 통계 ── */
  .stat-section-title { font-size: 16px; font-weight: 750; letter-spacing: -.02em; margin: 30px 0 15px; }
  .stat-section-title:first-of-type { margin-top: 6px; }
  .muted-note { font-size: 12.5px; color: var(--muted); font-weight: 500; }
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 16px; }
  .stat-card { padding: 22px 24px; }
  .stat-card-head { display: flex; align-items: center; justify-content: space-between; font-size: 17px; font-weight: 750; letter-spacing: -.02em; margin-bottom: 4px; }
  .stat-top { font-size: 12.5px; color: var(--muted); margin-bottom: 16px; }
  .stat-top b { color: var(--accent-2); font-weight: 700; }
  .chart-card { padding: 26px 28px; }
  .bar-row { display: flex; align-items: center; gap: 12px; margin-bottom: 11px; }
  .bar-row:last-child { margin-bottom: 0; }
  .bar-label { width: 110px; flex-shrink: 0; font-size: 13px; color: var(--text-2); letter-spacing: -.01em; }
  .bar-track { flex: 1; height: 10px; background: var(--glass-strong); border: 1px solid var(--hair); border-radius: 6px; overflow: hidden; }
  .bar-fill { height: 100%; background: var(--accent-grad); border-radius: 6px; transition: width .4s; }
  .bar-val { width: 28px; text-align: right; font-size: 13px; color: var(--muted); }
  .col-chart { display: flex; align-items: flex-end; gap: 10px; height: 180px; }
  .col { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; gap: 8px; height: 100%; }
  .col-bar { width: 64%; max-width: 34px; background: var(--accent-grad); border-radius: 6px 6px 0 0; min-height: 2px; transition: height .4s; }
  .col-num { font-size: 11px; font-weight: 700; color: var(--text-2); height: 13px; }
  .col-cap { font-size: 11.5px; color: var(--muted); }
  .col { cursor: pointer; }
  .col:hover .col-bar { filter: brightness(1.15); }
  .col-active .col-bar { box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px var(--accent-2); }
  .col-active .col-cap, .col-active .col-num { color: var(--accent-2); font-weight: 750; }
  .stat-chip { display: inline-block; font-size: 12px; font-weight: 650; color: var(--text-2); background: var(--glass); border: 1px solid var(--hair); padding: 4px 11px; border-radius: 20px; cursor: pointer; margin-left: 6px; transition: all .15s; }
  .stat-chip:hover { border-color: var(--accent); color: var(--text); }
  .stat-chip.chip-active { background: var(--accent-soft); border-color: var(--accent); color: var(--accent-2); }
  .md-hint { font-size: 12px; color: var(--faint); text-align: center; margin-top: 14px; }
  .month-detail:not(:empty) + .md-hint, .month-detail:not(:empty) { }
  .month-detail { margin-top: 18px; }
  .month-detail:not(:empty) { padding-top: 20px; border-top: 1px solid var(--hair); }
  .md-head { font-size: 14px; font-weight: 750; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .md-academy { font-size: 11.5px; font-weight: 700; color: var(--accent-2); background: var(--accent-soft); border: 1px solid var(--hair); padding: 2px 9px; border-radius: 20px; flex-shrink: 0; }
  @media (max-width: 760px) { .bar-label { width: 84px; font-size: 12px; } .col-chart { gap: 5px; } .col-cap { font-size: 10px; } }

  .badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 11px; border-radius: 30px; font-size: 12px; font-weight: 700; white-space: nowrap; letter-spacing: -.01em; }
  .badge .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; box-shadow: 0 0 8px 0 currentColor; }
  .badge-high { background: var(--rose-soft); color: var(--rose); }
  .badge-medium { background: var(--amber-soft); color: var(--amber); }
  .badge-low { background: var(--emerald-soft); color: var(--emerald); }
  .chg-tag { display:inline-flex; align-items:center; font-size:11px; font-weight:750; padding:2px 9px; border-radius:20px; letter-spacing:.02em; }
  .chg-신규 { background: var(--emerald-soft); color: var(--emerald); }
  .chg-종료 { background: var(--rose-soft); color: var(--rose); }
  .chg-변경 { background: var(--amber-soft); color: var(--amber); }

  .history-list { display: flex; flex-direction: column; gap: 11px; }
  .history-item { background: var(--glass); border: 1px solid var(--hair); border-radius: var(--radius-sm); padding: 18px 22px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; gap: 16px; box-shadow: var(--card-shadow); backdrop-filter: blur(14px); transition: border-color .16s, transform .12s; }
  .history-item:hover { border-color: var(--accent); transform: translateX(3px); }
  .history-date { font-size: 16px; font-weight: 750; letter-spacing: -.02em; }
  .history-sum { font-size: 13px; color: var(--muted); margin-top: 4px; letter-spacing: -.005em; }

  .empty { text-align: center; padding: 96px 24px; color: var(--muted); }
  .empty-icon { display:inline-flex; margin-bottom: 16px; color: var(--faint); }
  .empty-icon svg { width: 44px; height: 44px; }
  .empty-val { color: var(--muted); font-size: 14px; padding: 16px 18px; background: var(--glass); border: 1px dashed var(--hair-strong); border-radius: var(--radius-sm); text-align: center; }
  .spinner { width: 22px; height: 22px; border: 2.5px solid var(--hair-strong); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  #toast { position: fixed; bottom: 26px; right: 26px; z-index: 999; background: var(--glass-strong); color: var(--text); border: 1px solid var(--hair-strong); padding: 13px 19px; border-radius: var(--radius-sm); font-size: 13.5px; font-weight: 600; box-shadow: var(--shadow); backdrop-filter: blur(20px); opacity: 0; transform: translateY(12px); transition: all .28s cubic-bezier(.2,.7,.3,1); pointer-events: none; }
  #toast.show { opacity: 1; transform: translateY(0); }
  .crawl-fail { background: var(--rose-soft); color: var(--rose); border: 1px solid var(--rose-soft); border-radius: var(--radius-sm); padding: 12px 16px; font-size: 13.5px; font-weight: 650; margin-bottom: 20px; }

  @media (max-width: 760px) {
    .app { flex-direction: column; }
    .sidebar { width: 100%; height: auto; position: static; flex-direction: column; border-right: none; border-bottom: 1px solid var(--hair); }
    .sidebar-foot { margin-top: 0; }
    .content { padding: 24px 18px 44px; }
    .page-title { font-size: 23px; }
    .kpi-value { font-size: 32px; }
  }
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-logo">잇</div>
      <div>
        <div class="brand-title">경쟁사 모니터링</div>

</div>

<div id="toast"></div>

<script>
// ── 아이콘 (Lucide 스타일 인라인 SVG) ──
const ICONS = {
  dashboard: '<rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/>',
  history: '<path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/>',
  building: '<path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/><path d="M10 6h4"/><path d="M10 10h4"/><path d="M10 14h4"/><path d="M10 18h4"/>',
  alert: '<path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/>',
  target: '<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>',
  bulb: '<path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/>',
  compare: '<path d="m16 3 4 4-4 4"/><path d="M20 7H4"/><path d="m8 21-4-4 4-4"/><path d="M4 17h16"/>',
  refresh: '<path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/>',
  moon: '<path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>',
  sun: '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>',
  external: '<path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>',
  calendar: '<rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18M8 2v4M16 2v4"/>',
  signal: '<path d="M2 20h.01"/><path d="M7 20v-4"/><path d="M12 20v-8"/><path d="M17 20V8"/><path d="M22 4v16"/>',
  chart: '<path d="M3 3v16a2 2 0 0 0 2 2h16"/><rect x="7" y="11" width="3" height="6" rx="1"/><rect x="12" y="7" width="3" height="10" rx="1"/><rect x="17" y="13" width="3" height="4" rx="1"/>',
};
function ic(name, size) { const s = size || 18; return `<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${ICONS[name] || ''}</svg>`; }
function initStaticIcons() { document.querySelectorAll('[data-ic]').forEach(el => { el.innerHTML = ic(el.dataset.ic, el.closest('.kpi-icon') ? 18 : 16); }); }

// ── 스파크라인 (주간 추이 미니차트) ──
let sparkSeq = 0;
function spark(values, stroke) {
  const v = (values || []).filter(x => typeof x === 'number');
  if (v.length < 2) return `<div class="spark-empty">추이는 데이터가 쌓이면 표시됩니다</div>`;
  const max = Math.max(...v), min = Math.min(...v);
  const range = (max - min) || 1, W = 100, H = 26, n = v.length;
  const pts = v.map((x, i) => [(i / (n - 1)) * W, H - 2 - ((x - min) / range) * (H - 5)]);
  const line = pts.map((p, i) => `${i ? 'L' : 'M'}${p[0].toFixed(1)} ${p[1].toFixed(1)}`).join(' ');
  const area = `M0 ${H} L` + pts.map(p => p[0].toFixed(1) + ' ' + p[1].toFixed(1)).join(' L') + ` L${W} ${H} Z`;
  const last = pts[pts.length - 1], gid = 'spk' + (sparkSeq++);
  return `<div class="spark"><svg viewBox="0 0 100 26" preserveAspectRatio="none">
    <defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${stroke}" stop-opacity=".3"/><stop offset="1" stop-color="${stroke}" stop-opacity="0"/></linearGradient></defs>
    <path d="${area}" fill="url(#${gid})"/>
    <path d="${line}" fill="none" stroke="${stroke}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" vector-effect="non-scaling-stroke"/>
    <circle cx="${last[0].toFixed(1)}" cy="${last[1].toFixed(1)}" r="2.4" fill="${stroke}" vector-effect="non-scaling-stroke"/>
  </svg></div>`;
}

let currentView = 'today';
let latestData = null;
let historyData = [];
let selectedCompetitor = null;
let isDark = true;
let hasBackend = false;

function applyTheme() {
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  const btn = document.getElementById('theme-btn');
  if (btn) btn.innerHTML = ic(isDark ? 'moon' : 'sun', 15);
}
function toggleTheme() { isDark = !isDark; localStorage.setItem('theme', isDark ? 'dark' : 'light'); applyTheme(); }
(function () { isDark = localStorage.getItem('theme') !== 'light'; document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light'); })();

function setView(view) {
  currentView = view;
  document.getElementById('nav-today').classList.toggle('active', view === 'today');
  document.getElementById('nav-stats').classList.toggle('active', view === 'stats');
  document.getElementById('nav-history').classList.toggle('active', view === 'history');
  render();
}

async function fetchJson(url) {
  const res = await fetch(url + '?t=' + Date.now(), { cache: 'no-store' });
  if (!res.ok) throw new Error(url + ' (' + res.status + ')');
  return res.json();
}

async function loadData() {
  setRefreshing(true);
  try {
    const [latest, history] = await Promise.all([
      fetchJson('./data/latest.json').catch(() => ({ empty: true, competitors: [] })),
      fetchJson('./data/history.json').catch(() => []),
    ]);
    latestData = latest;
    historyData = Array.isArray(history) ? history : [];
    if (latestData?.createdAt) {
      const d = new Date(latestData.createdAt);
      document.getElementById('last-run-text').innerHTML =
        `마지막 업데이트<br><b>${d.toLocaleDateString('ko-KR')} ${d.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' })}</b>`;
    } else {
      document.getElementById('last-run-text').textContent = '아직 수집 전';
    }
    if (!selectedCompetitor && latestData?.competitors?.length > 0) selectedCompetitor = latestData.competitors[0].id;
    renderSidebarCompetitors();
    render();
  } catch (e) {
    showToast('데이터 로드 실패: ' + e.message);
  } finally { setRefreshing(false); }
}

async function detectBackend() {
  try { const res = await fetch('/api/status', { cache: 'no-store' }); hasBackend = res.ok && (await res.json()).local === true; }
  catch { hasBackend = false; }
  const runBtn = document.getElementById('run-btn');
  if (runBtn) runBtn.style.display = hasBackend ? '' : 'none';
}

function setRefreshing(on) {
  const btn = document.getElementById('refresh-btn');
  btn.innerHTML = on ? '<span class="spinner" style="width:14px;height:14px;border-width:2px"></span>' : (ic('refresh', 15) + ' 새로고침');
  btn.disabled = on;
}

async function triggerRun() {
  const btn = document.getElementById('run-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner" style="width:13px;height:13px;border-width:2px"></span> 실행 중…';
  try {
    await fetch('/api/run', { method: 'POST' });
    showToast('크롤링 & 분석 시작! 1~2분 후 새로고침 하세요.');
    setTimeout(() => loadData(), 90000);
  } catch (e) { showToast('실행 실패: ' + e.message); }
  finally { setTimeout(() => { btn.disabled = false; btn.textContent = '지금 실행'; }, 5000); }
}

// 사이드바 분류 구조 (대분류 → 소분류 → 경쟁사 id)
const MENU = [
  { cat: '학원', subs: [
    { name: '독학재수학원', ids: ['itall_sparta', 'daesung_dlab', 'sumanhui_sparta'] },
  ] },
  // 소분류 없이 업체명만 표시
  { cat: '스터디카페', companies: [
    { id: 'jaksim', name: '작심스터디카페' },
  ] },
];

function compItem(c) {
  return `<div class="comp-item ${c.id === selectedCompetitor ? 'active' : ''}" onclick="selectCompetitor('${c.id}')">
      <span class="comp-dot"></span><span class="comp-name">${escHtml(c.name)}</span>
    </div>`;
}

function companyPlaceholder(name) {
  return `<div class="comp-item comp-item-disabled">
      <span class="comp-dot dim"></span><span class="comp-name" style="color:var(--muted)">${escHtml(name)}</span>
      <span class="comp-pending">준비중</span>
    </div>`;
}

function renderSidebarCompetitors() {
  const el = document.getElementById('comp-list');
  const comps = latestData?.competitors || [];
  const byId = Object.fromEntries(comps.map(c => [c.id, c]));
  const used = new Set();
  let html = '';
  for (const group of MENU) {
    html += `<div class="cat-group"><div class="cat-label">${escHtml(group.cat)}</div>`;
    // 소분류가 있는 경우
    for (const sub of (group.subs || [])) {
      html += `<div class="sub-label">${escHtml(sub.name)}</div>`;
      const items = sub.ids.map(id => { used.add(id); return byId[id]; }).filter(Boolean);
      html += items.length ? items.map(compItem).join('') : `<div class="comp-empty">준비중</div>`;
    }
    // 소분류 없이 업체명만 나열하는 경우
    for (const co of (group.companies || [])) {
      used.add(co.id);
      html += byId[co.id] ? compItem(byId[co.id]) : companyPlaceholder(co.name);
    }
    html += `</div>`;
  }
  // MENU에 분류되지 않은 데이터는 '기타'로 노출 (누락 방지)
  const others = comps.filter(c => !used.has(c.id));
  if (others.length) html += `<div class="cat-group"><div class="cat-label">기타</div>${others.map(compItem).join('')}</div>`;
  el.innerHTML = html;
}

function selectCompetitor(id) {
  selectedCompetitor = id;
  if (currentView !== 'today') { setView('today'); }
  renderSidebarCompetitors();
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function render() {
  if (currentView === 'today') renderToday();
  else if (currentView === 'stats') renderStats();
  else renderHistory();
}

// 과거 수집 이력에서 지표 추이(오래된→최신) 계산
function seriesOf(fn) {
  return [...historyData].reverse().slice(-8).map(r => fn(r.competitors || []));
}

function renderToday() {
  const el = document.getElementById('content');
  if (!latestData || latestData.empty || !(latestData.competitors || []).length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">${ic('signal', 44)}</div><p>아직 수집된 데이터가 없습니다.</p><p style="margin-top:8px;font-size:13px">매주 금요일 오후 3시에 자동으로 수집됩니다.</p></div>`;
    return;
  }
  const comps = latestData.competitors;
  const current = comps.find(c => c.id === selectedCompetitor) || comps[0];
  const dateStr = new Date(latestData.createdAt).toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' });
  const promoTotal = comps.reduce((s, c) => s + (c.analysis?.promotions?.length || 0), 0);
  const recoTotal = comps.reduce((s, c) => s + (c.analysis?.recommendations?.length || 0), 0);
  const promoSeries = seriesOf(cs => cs.reduce((s, c) => s + (c.analysis?.promotions?.length || 0), 0));
  const recoSeries = seriesOf(cs => cs.reduce((s, c) => s + (c.analysis?.recommendations?.length || 0), 0));

  el.innerHTML = `
    <div class="page-head">
      <div>
        <div class="page-title">오늘 현황</div>
        <div class="page-sub">${dateStr} 기준 · 주간 모니터링 리포트</div>
      </div>
      <div class="live-pill"><span class="live-dot"></span> 자동 수집 가동중</div>
    </div>

    <div class="kpis">
      <div class="kpi accent">
        <div class="kpi-top"><span class="kpi-label">모니터링 경쟁사</span><span class="kpi-icon">${ic('building')}</span></div>
        <div class="kpi-value num">${comps.length}<small>개사</small></div>
      </div>
      <div class="kpi">
        <div class="kpi-top"><span class="kpi-label">감지된 프로모션</span><span class="kpi-icon" style="color:var(--amber)">${ic('target')}</span></div>
        <div class="kpi-value num">${promoTotal}<small>건</small></div>
        ${spark(promoSeries, 'var(--amber)')}
      </div>
      <div class="kpi">
        <div class="kpi-top"><span class="kpi-label">점주 대응방안</span><span class="kpi-icon">${ic('bulb')}</span></div>
        <div class="kpi-value num">${recoTotal}<small>건</small></div>
        ${spark(recoSeries, 'var(--accent)')}
      </div>
    </div>

    ${current ? renderDetail(current) : ''}`;
}

function renderDetail(c) {
  const a = c.analysis || {};
  const crawledAt = c.crawl?.crawledAt ? new Date(c.crawl.crawledAt).toLocaleString('ko-KR', { month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : '-';
  return `
    <div class="card">
      <div class="detail-head">
        <div>
          <div class="detail-name">${escHtml(c.name)}</div>
          <div class="detail-meta"><a href="${escHtml(c.url)}" target="_blank">${escHtml(c.url)}</a> · 수집 ${crawledAt}${c.crawl?.success === false ? ' · <span style="color:var(--rose)">크롤링 실패</span>' : ''}</div>
        </div>
      </div>
      <div class="detail-body">
        ${a.stale ? `<div class="crawl-fail" style="background:var(--amber-soft);color:var(--amber);border-color:transparent">↻ ${escHtml(a.staleReason || '이번 수집 분석 실패 — 직전 결과를 표시 중입니다')}</div>` : ''}
        ${(c.crawl?.success === false && !a.stale) ? `<div class="crawl-fail">⚠️ 크롤링에 실패해 분석 정확도가 낮을 수 있습니다.</div>` : ''}
        <div class="summary-box">${escHtml(a.summary || '요약 없음')}</div>
        <div class="grid-2">
          <div>
            <div class="col-head"><span class="ic">${ic('target', 16)}</span> 감지된 프로모션 <span class="col-count num">${a.promotions?.length || 0}</span></div>
            ${a.promotions?.length ? `<div class="item-list">${a.promotions.map(p => `
              <a class="item item-promo item-link" href="${escHtml(p.url || c.url)}" target="_blank" rel="noopener">
                <div class="item-head"><div class="item-title">${escHtml(p.title)}</div><span class="ext">${ic('external', 15)}</span></div>
                <div class="item-detail">${escHtml(p.detail)}</div>
                ${p.period ? `<div class="item-period">${ic('calendar', 13)} ${escHtml(p.period)}</div>` : ''}
              </a>`).join('')}</div>` : `<div class="empty-val">특이 프로모션 없음</div>`}
          </div>
          <div>
            <div class="col-head"><span class="ic">${ic('bulb', 16)}</span> 점주 대응방안 <span class="col-count num">${a.recommendations?.length || 0}</span></div>
            ${a.recommendations?.length ? `<div class="item-list">${a.recommendations.map(r => `
              <div class="item item-reco">
                <div class="item-title">${escHtml(r.action)}</div>
                <div class="item-detail">${escHtml(r.detail)}</div>
              </div>`).join('')}</div>` : `<div class="empty-val">대응방안 없음</div>`}
          </div>
        </div>
        <div class="changes-block">
          <div class="col-head"><span class="ic">${ic('compare', 16)}</span> 지난주 대비 변경 <span class="col-count num">${a.changes?.length || 0}</span></div>
          ${a.changes?.length ? `<div class="item-list">${a.changes.map(ch => `
            <div class="item">
              <div class="item-head">${chgTag(ch.type)}<div class="item-title">${escHtml(ch.type)}</div></div>
              <div class="item-detail">${escHtml(ch.description)}</div>
            </div>`).join('')}</div>` : `<div class="empty-val">지난주 대비 변경 없음</div>`}
        </div>
      </div>
    </div>`;
}

// ── 통계 ──
const KEYWORDS = [
  { key: '할인·혜택', terms: ['할인', '%', '환급', '페이백', '혜택', '수강료', '페이', '할인이벤트'] },
  { key: '장학금', terms: ['장학'] },
  { key: '무료체험', terms: ['무료체험', '체험', '1day', '무료 체험', '무료'] },
  { key: '모의고사', terms: ['모의고사', '평가원', '모평', '더프리미엄', '더프', '이감', '학력평가', '9평', '6평', '리부트'] },
  { key: '신규오픈·지점', terms: ['신규', '오픈', '지점', '캠프', '센터', '사전 예약', '사전예약'] },
  { key: '설명회·상담', terms: ['설명회', '상담', '컨설팅'] },
  { key: '재등록·환승', terms: ['재등록', '환승', '어게인', '동반', '형제', '이동'] },
  { key: '모집', terms: ['모집', '재수', '반수', '썸머', '윈터', '선행', '정규반'] },
  { key: '굿즈·이벤트', terms: ['굿즈', '랜덤박스', '상품', '플래너', '키링', '스토어', '응원'] },
];
function classifyPromo(p) {
  const t = ((p.title || '') + ' ' + (p.detail || '')).toLowerCase();
  const hits = KEYWORDS.filter(k => k.terms.some(term => t.includes(term.toLowerCase()))).map(k => k.key);
  return hits.length ? hits : ['기타'];
}
function monthsOf(p) {
  const s = (p.period || '') + ' ' + (p.title || '');
  const months = new Set();
  let m;
  const re = /(\d{4})[.\-\/\s]+(\d{1,2})/g;
  while ((m = re.exec(s))) { const mo = +m[2]; if (mo >= 1 && mo <= 12) months.add(mo); }
  const re2 = /(\d{1,2})\s*월/g;
  while ((m = re2.exec(s))) { const mo = +m[1]; if (mo >= 1 && mo <= 12) months.add(mo); }
  if (!months.size) return /상시|연중|수시|상시진행/.test(s) ? ['상시'] : ['기타'];
  return [...months];
}
function barRow(label, val, max) {
  return `<div class="bar-row"><div class="bar-label">${escHtml(label)}</div><div class="bar-track"><div class="bar-fill" style="width:${(val / max * 100).toFixed(0)}%"></div></div><div class="bar-val num">${val}</div></div>`;
}

// 월별 프로모션 목록 (시기별 차트에서 막대 클릭 시 표시)
let STAT_MONTHS = {};
function selectStatMonth(m) {
  const key = String(m);
  document.querySelectorAll('.col').forEach(el => el.classList.toggle('col-active', el.dataset.m === key));
  document.querySelectorAll('.stat-chip').forEach(el => el.classList.toggle('chip-active', el.dataset.m === key));
  const box = document.getElementById('month-detail');
  if (!box) return;
  const list = STAT_MONTHS[key] || [];
  const label = (key === '상시') ? '상시 진행' : (key === '기타') ? '기간 미상' : key + '월';
  if (!list.length) { box.innerHTML = `<div class="empty-val">${escHtml(label)}에 해당하는 프로모션이 없습니다</div>`; return; }
  box.innerHTML = `<div class="md-head">${escHtml(label)} 프로모션 <span class="col-count num">${list.length}</span></div>
    <div class="item-list">${list.map(x => `
      <a class="item item-promo item-link" href="${escHtml(x.p.url || x.url || '#')}" target="_blank" rel="noopener">
        <div class="item-head"><span class="md-academy">${escHtml(x.academy)}</span><div class="item-title">${escHtml(x.p.title)}</div><span class="ext">${ic('external', 15)}</span></div>
        <div class="item-detail">${escHtml(x.p.detail || '')}</div>
        ${x.p.period ? `<div class="item-period">${ic('calendar', 13)} ${escHtml(x.p.period)}</div>` : ''}
      </a>`).join('')}</div>`;
}

function renderStats() {
  const el = document.getElementById('content');
  const records = historyData.length ? historyData : (latestData && !latestData.empty ? [latestData] : []);
  if (!records.length) { el.innerHTML = `<div class="empty"><div class="empty-icon">${ic('chart', 44)}</div><p>통계를 낼 데이터가 아직 없습니다.</p></div>`; return; }

  // 학원별 '고유 프로모션' 집계 — id로 묶고(이름 인코딩 깨짐 방지) 제목 기준 중복 제거
  const per = {}; const order = [];
  for (const rec of records) {
    for (const c of (rec.competitors || [])) {
      if (!c.analysis?.promotions?.length) continue;
      const id = c.id || c.name;
      if (!per[id]) { per[id] = { name: c.name, url: c.url, map: new Map() }; order.push(id); } // 최신(맨 앞) 레코드의 이름/주소 사용
      for (const p of c.analysis.promotions) { const k = (p.title || '').trim(); if (k && !per[id].map.has(k)) per[id].map.set(k, p); }
    }
  }
  const academies = order.map(id => ({ name: per[id].name, url: per[id].url, promos: [...per[id].map.values()] }));
  const totalPromos = academies.reduce((s, a) => s + a.promos.length, 0);

  // 학원별 키워드 카드
  const academyCards = academies.map(a => {
    const counts = {};
    a.promos.forEach(p => classifyPromo(p).forEach(k => counts[k] = (counts[k] || 0) + 1));
    const rows = Object.entries(counts).sort((x, y) => y[1] - x[1]);
    const max = Math.max(1, ...rows.map(r => r[1]));
    const top = rows[0] ? rows[0][0] : '-';
    return `<div class="card stat-card">
      <div class="stat-card-head">${escHtml(a.name)}<span class="col-count num">${a.promos.length}건</span></div>
      <div class="stat-top">주력: <b>${escHtml(top)}</b></div>
      ${rows.map(([k, v]) => barRow(k, v, max)).join('')}
    </div>`;
  }).join('');

  // 시기별(월) 분포 + 월별 프로모션 목록
  STAT_MONTHS = {};
  academies.forEach(a => a.promos.forEach(p => {
    monthsOf(p).forEach(x => { const k = String(x); (STAT_MONTHS[k] = STAT_MONTHS[k] || []).push({ academy: a.name, url: a.url, p }); });
  }));
  const mc = {}; for (let i = 1; i <= 12; i++) mc[i] = (STAT_MONTHS[i] || []).length;
  const maxM = Math.max(1, ...Object.values(mc));
  let cols = '';
  for (let i = 1; i <= 12; i++) cols += `<div class="col" data-m="${i}" onclick="selectStatMonth(${i})"><div class="col-num num">${mc[i] || ''}</div><div class="col-bar" style="height:${(mc[i] / maxM * 100).toFixed(0)}%"></div><div class="col-cap">${i}월</div></div>`;
  const always = (STAT_MONTHS['상시'] || []).length, etc = (STAT_MONTHS['기타'] || []).length;
  const chips = (always ? `<span class="stat-chip" data-m="상시" onclick="selectStatMonth('상시')">상시 진행 ${always}</span>` : '')
    + (etc ? `<span class="stat-chip" data-m="기타" onclick="selectStatMonth('기타')">기간 미상 ${etc}</span>` : '');

  // 전체 키워드 분포
  const all = {}; academies.forEach(a => a.promos.forEach(p => classifyPromo(p).forEach(k => all[k] = (all[k] || 0) + 1)));
  const allRows = Object.entries(all).sort((x, y) => y[1] - x[1]); const allMax = Math.max(1, ...allRows.map(r => r[1]));

  el.innerHTML = `
    <div class="page-head"><div><div class="page-title">통계 현황</div><div class="page-sub">고유 프로모션 ${totalPromos}건 기준 · 키워드/시기별 분석</div></div></div>

    <div class="stat-section-title">🏫 학원별 마케팅 유형</div>
    <div class="stat-grid">${academyCards}</div>

    <div class="stat-section-title">📅 시기별 프로모션 분포 ${chips}</div>
    <div class="card chart-card">
      <div class="col-chart">${cols}</div>
      <div id="month-detail" class="month-detail"></div>
    </div>

    <div class="stat-section-title">🔑 전체 키워드 분포</div>
    <div class="card chart-card">${allRows.map(([k, v]) => barRow(k, v, allMax)).join('')}</div>
  `;

  // 기본 선택: 가장 건수가 많은 달 (없으면 상시/기타)
  let def = 1, best = -1;
  for (let i = 1; i <= 12; i++) if (mc[i] > best) { best = mc[i]; def = i; }
  selectStatMonth(best > 0 ? def : (always ? '상시' : (etc ? '기타' : 1)));
}

function renderHistory() {
  const el = document.getElementById('content');
  el.innerHTML = `
    <div class="page-head"><div><div class="page-title">히스토리</div><div class="page-sub">최근 ${historyData.length}회 수집 이력</div></div></div>
    ${!historyData.length
      ? `<div class="empty"><div class="empty-icon">${ic('history', 44)}</div><p>히스토리가 없습니다.</p></div>`
      : `<div class="history-list">${historyData.map(r => `
          <div class="history-item" onclick="loadHistoryDate('${r.date}')">
            <div>
              <div class="history-date">${formatDate(r.date)}</div>
              <div class="history-sum">${r.competitors.map(c => `${escHtml(c.name)}: ${escHtml(c.analysis?.summary || '-')}`).join(' · ')}</div>
            </div>
            <span class="ext" style="color:var(--muted)">${ic('external', 16)}</span>
          </div>`).join('')}</div>`}`;
}

function loadHistoryDate(date) {
  const data = historyData.find(r => r.date === date);
  if (!data) { showToast('해당 날짜 데이터 없음'); return; }
  latestData = data;
  selectedCompetitor = data.competitors?.[0]?.id;
  renderSidebarCompetitors();
  setView('today');
  showToast(formatDate(date) + ' 기록을 표시합니다');
}

function chgTag(type) { const t = ['신규', '종료', '변경'].includes(type) ? type : '변경'; return `<span class="chg-tag chg-${t}">${t}</span>`; }
function escHtml(s) { if (!s) return ''; return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
function formatDate(d) { return new Date(d).toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' }); }
function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); }

initStaticIcons();
applyTheme();
detectBackend();
loadData();
</script>
</body>
</html>
