<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>경쟁사 홈페이지 분석 자동화 대시보드</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  :root {
    --font: 'Pretendard','Pretendard Variable','Apple SD Gothic Neo',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    --mono: 'SF Mono','JetBrains Mono','Cascadia Code',ui-monospace,monospace;
    --radius: 18px; --radius-sm: 12px; --radius-xs: 9px;
  }
  [data-theme="dark"] {
    --bg: #07080c; --bg-2: #0a0b11;
    --glass: rgba(255,255,255,.035); --glass-strong: rgba(255,255,255,.055);
    --hair: rgba(255,255,255,.08); --hair-strong: rgba(255,255,255,.14);
    --text: #f3f5fb; --text-2: #b9c0d4; --muted: #767e96; --faint: #525a72;
    --accent: #8b8cf9; --accent-2: #c084fc;
    --accent-grad: linear-gradient(135deg,#7c7ef8,#c084fc);
    --accent-soft: rgba(124,126,248,.14);
    --rose: #fb7185; --amber: #fbbf24; --emerald: #34d399;
    --rose-soft: rgba(251,113,133,.13); --amber-soft: rgba(251,191,36,.13); --emerald-soft: rgba(52,211,153,.13);
    --shadow: 0 24px 60px -18px rgba(0,0,0,.7);
    --card-shadow: 0 1px 0 rgba(255,255,255,.04) inset, 0 18px 40px -22px rgba(0,0,0,.8);
    --glow: radial-gradient(900px 520px at 75% -8%, rgba(124,126,248,.18), transparent 60%), radial-gradient(720px 440px at 8% 4%, rgba(192,132,252,.10), transparent 55%);
    --dot: rgba(255,255,255,.028);
  }
  [data-theme="light"] {
    --bg: #f4f5f9; --bg-2: #eef0f6;
    --glass: rgba(255,255,255,.75); --glass-strong: #ffffff;
    --hair: rgba(15,20,40,.09); --hair-strong: rgba(15,20,40,.16);
    --text: #11142a; --text-2: #3a425e; --muted: #6b7488; --faint: #97a0b8;
    --accent: #5b5bd6; --accent-2: #9333ea;
    --accent-grad: linear-gradient(135deg,#5b5bd6,#9333ea);
    --accent-soft: rgba(91,91,214,.10);
    --rose: #e11d48; --amber: #c2740a; --emerald: #047857;
    --rose-soft: rgba(225,29,72,.09); --amber-soft: rgba(194,116,10,.10); --emerald-soft: rgba(4,120,87,.10);
    --shadow: 0 24px 60px -22px rgba(20,30,70,.22);
    --card-shadow: 0 1px 2px rgba(20,30,70,.05), 0 16px 36px -24px rgba(20,30,70,.22);
    --glow: radial-gradient(900px 520px at 78% -10%, rgba(91,91,214,.10), transparent 60%);
    --dot: rgba(20,30,70,.04);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { min-height: 100%; }
  body {
    background: var(--bg); color: var(--text); font-family: var(--font);
    font-size: 17px; line-height: 1.6; letter-spacing: -.003em;
    -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
    transition: background .3s, color .3s;
    zoom: 1.13; /* 전체 글자 약 2pt 확대 */
  }
  @media print { body { zoom: 1; } }
  body::before { content: ''; position: fixed; inset: 0; z-index: -2; background: var(--glow); }
  body::after {
    content: ''; position: fixed; inset: 0; z-index: -2; pointer-events: none;
    background-image: radial-gradient(var(--dot) 1px, transparent 1px); background-size: 26px 26px;
    mask-image: radial-gradient(circle at 50% 30%, #000 30%, transparent 90%);
  }
  .num { font-variant-numeric: tabular-nums; font-feature-settings: "tnum" 1; }
  svg { display: block; }

  .app { display: flex; min-height: 100vh; }

  /* ── 사이드바 ── */
  .sidebar {
    width: 280px; flex-shrink: 0; padding: 24px 18px; position: sticky; top: 0; height: 100vh;
    display: flex; flex-direction: column; gap: 26px; overflow-y: auto;
    background: linear-gradient(180deg, var(--glass-strong), var(--glass));
    border-right: 1px solid var(--hair); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  }
  .brand { display: flex; align-items: center; gap: 12px; padding: 2px 6px; }
  .brand-logo { width: 42px; height: 42px; border-radius: 13px; background: var(--accent-grad); display: grid; place-items: center; color: #fff; font-weight: 800; font-size: 19px; box-shadow: 0 8px 22px -8px var(--accent); flex-shrink: 0; }
  .brand { align-items: flex-start; }
  .brand > div:last-child { min-width: 0; }
  .brand-title { font-size: 19px; font-weight: 800; letter-spacing: -.02em; line-height: 1.25; }
  .brand-sub { font-size: 11px; color: var(--muted); letter-spacing: 0; margin-top: 4px; line-height: 1.45; white-space: normal; overflow: visible; }

  .nav-label { font-size: 10.5px; font-weight: 700; color: var(--faint); letter-spacing: .12em; text-transform: uppercase; padding: 0 10px; margin-bottom: 9px; }
  .nav { display: flex; flex-direction: column; gap: 3px; }
  .nav-btn { display: flex; align-items: center; gap: 11px; padding: 11px 13px; border: 1px solid transparent; background: transparent; color: var(--text-2); font-family: var(--font); font-size: 15.5px; font-weight: 600; border-radius: var(--radius-xs); cursor: pointer; text-align: left; width: 100%; transition: all .16s; }
  .nav-btn:hover { background: var(--glass-strong); color: var(--text); }
  .nav-btn.active { background: var(--accent-soft); color: var(--text); border-color: var(--hair-strong); }
  .nav-btn .ic { color: var(--muted); display: inline-flex; }
  .nav-btn.active .ic { color: var(--accent); }

  .comp-list { display: flex; flex-direction: column; gap: 5px; }
  .comp-item { display: flex; align-items: center; gap: 10px; padding: 11px 12px; border-radius: var(--radius-xs); cursor: pointer; border: 1px solid transparent; transition: all .16s; }
  .comp-item:hover { background: var(--glass-strong); }
  .comp-item.active { background: var(--accent-soft); border-color: var(--hair-strong); }
  .comp-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; background: var(--accent); color: var(--accent); box-shadow: 0 0 10px 0 currentColor; }
  .cat-group { margin-bottom: 14px; }
  .cat-group + .cat-group { margin-top: 4px; }
  .cat-label { display: flex; align-items: center; gap: 8px; font-size: 11.5px; font-weight: 750; color: var(--text-2); letter-spacing: .03em; padding: 0 10px; margin: 4px 0 8px; }
  .cat-label::after { content: ''; flex: 1; height: 1px; background: var(--hair); }
  .sub-label { font-size: 10.5px; font-weight: 700; color: var(--faint); letter-spacing: .04em; padding: 0 10px; margin: 10px 0 5px; }
  .comp-empty { font-size: 12.5px; color: var(--faint); padding: 9px 12px; font-style: italic; border: 1px dashed var(--hair); border-radius: var(--radius-xs); margin: 2px 0; }
  .comp-item-disabled { cursor: default; }
  .comp-item-disabled:hover { background: transparent; }
  .comp-dot.dim { background: var(--faint); color: var(--faint); box-shadow: none; }
  .comp-pending { margin-left: auto; font-size: 10.5px; color: var(--faint); font-weight: 700; border: 1px solid var(--hair); padding: 2px 7px; border-radius: 20px; }
  .comp-name { font-size: 15px; font-weight: 650; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: -.01em; }

  .sidebar-foot { margin-top: auto; display: flex; flex-direction: column; gap: 11px; padding-top: 16px; border-top: 1px solid var(--hair); }
  .role-indic { font-size: 12px; color: var(--muted); } .role-indic b { color: var(--text-2); } .role-indic a { color: var(--accent-2); text-decoration: none; }
  .last-run { font-size: 12px; color: var(--muted); padding: 0 8px; line-height: 1.5; }
  .last-run b { color: var(--text-2); font-weight: 650; }
  .foot-actions { display: flex; gap: 8px; }

  .btn { padding: 9px 14px; border-radius: var(--radius-xs); border: 1px solid var(--hair-strong); background: var(--glass); color: var(--text-2); font-family: var(--font); font-size: 13px; font-weight: 650; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 7px; transition: all .16s; }
  .btn:hover { border-color: var(--accent); color: var(--text); background: var(--glass-strong); }
  .btn:active { transform: scale(.97); }
  .btn svg { width: 15px; height: 15px; }
  .btn-primary { background: var(--accent-grad); border-color: transparent; color: #fff; box-shadow: 0 10px 24px -10px var(--accent); }
  .btn-primary:hover { color: #fff; filter: brightness(1.08); }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .btn-block { flex: 1; }
  .btn-ico { padding: 9px 11px; }

  /* ── 본문 ── */
  .content { flex: 1; min-width: 0; padding: 36px 44px 60px; max-width: 1340px; }
  .page-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; margin-bottom: 30px; flex-wrap: wrap; }
  .page-title { font-size: 28px; font-weight: 800; letter-spacing: -.035em; line-height: 1.1; }
  .page-sub { font-size: 13.5px; color: var(--muted); margin-top: 6px; letter-spacing: -.01em; }
  .today-head-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  /* 사이드바 접기/펼치기 — 사이드바 오른쪽 끝선 세로 중앙에 붙는 탭 핸들 */
  #sidebar-toggle { position: fixed; top: 50%; left: 280px; margin-left: -15px; transform: translateY(-50%); z-index: 200; width: 30px; height: 60px; border-radius: 9px; border: 1px solid var(--hair-strong); background: var(--glass-strong); color: var(--text); cursor: pointer; backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); box-shadow: var(--card-shadow); display: inline-flex; align-items: center; justify-content: center; transition: left .22s ease; }
  #sidebar-toggle::before { content: '‹'; font-size: 22px; font-weight: 700; line-height: 1; }
  #sidebar-toggle:hover { color: var(--accent-2); border-color: var(--accent-soft); }
  body.sidebar-collapsed #sidebar-toggle { left: 0; margin-left: 0; border-radius: 0 10px 10px 0; }
  body.sidebar-collapsed #sidebar-toggle::before { content: '›'; }
  body.sidebar-collapsed .sidebar { display: none; }
  .live-pill { display: inline-flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 650; color: var(--text-2); background: var(--glass); border: 1px solid var(--hair); padding: 7px 13px; border-radius: 30px; }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--emerald); animation: pulse 2.4s infinite; }
  @keyframes pulse { 0%{box-shadow:0 0 0 0 var(--emerald-soft)} 70%{box-shadow:0 0 0 7px transparent} 100%{box-shadow:0 0 0 0 transparent} }

  /* ── KPI 베이토 ── */
  .kpis { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 30px; }
  @media (max-width: 1080px) { .kpis { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 680px) { .kpis { grid-template-columns: 1fr; } }
  .kpi { position: relative; background: var(--glass); border: 1px solid var(--hair); border-radius: var(--radius); padding: 20px 22px; box-shadow: var(--card-shadow); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); overflow: hidden; transition: transform .18s, border-color .18s; }
  .kpi::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--hair-strong), transparent); }
  .kpi:hover { transform: translateY(-3px); border-color: var(--hair-strong); }
  .kpi-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .kpi-label { font-size: 12.5px; color: var(--muted); font-weight: 650; letter-spacing: -.01em; }
  .kpi-icon { width: 36px; height: 36px; border-radius: 11px; display: grid; place-items: center; border: 1px solid var(--hair); color: var(--accent); }
  .kpi-icon svg { width: 18px; height: 18px; }
  .kpi-value { font-size: 38px; font-weight: 800; line-height: 1; letter-spacing: -.04em; }
  .kpi-value small { font-size: 15px; font-weight: 650; color: var(--muted); letter-spacing: -.01em; margin-left: 3px; }
  .kpi-foot { font-size: 12px; color: var(--faint); margin-top: 10px; font-weight: 500; }
  .kpi.alert { border-color: var(--rose-soft); }
  .kpi.alert .kpi-value { color: var(--rose); }
  .kpi.accent .kpi-value { background: var(--accent-grad); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .spark { margin-top: 12px; }
  .spark svg { width: 100%; height: 26px; }
  .spark-empty { margin-top: 12px; font-size: 11px; color: var(--faint); font-weight: 500; }

  /* ── 카드 ── */
  .card { background: var(--glass); border: 1px solid var(--hair); border-radius: var(--radius); box-shadow: var(--card-shadow); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); overflow: hidden; }
  .detail-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 20px; padding: 26px 30px; border-bottom: 1px solid var(--hair); flex-wrap: wrap; background: linear-gradient(180deg, var(--glass-strong), transparent); }
  .detail-name { font-size: 25px; font-weight: 800; letter-spacing: -.03em; display: flex; align-items: center; gap: 12px; }
  .detail-meta { font-size: 12.5px; color: var(--muted); margin-top: 8px; letter-spacing: -.01em; }
  .detail-meta a { color: var(--accent); text-decoration: none; }
  .detail-meta a:hover { text-decoration: underline; }
  .urgency-block { text-align: right; }
  .urgency-reason { font-size: 12.5px; color: var(--muted); max-width: 300px; margin-top: 10px; line-height: 1.55; }

  .detail-body { padding: 28px 30px; }
  .summary-box { position: relative; background: var(--accent-soft); border: 1px solid var(--hair); border-radius: var(--radius-sm); padding: 20px 22px 20px 24px; font-size: 16.5px; font-weight: 550; line-height: 1.65; color: var(--text); margin-bottom: 30px; letter-spacing: -.01em; }
  .summary-box::before { content: ''; position: absolute; left: 0; top: 14px; bottom: 14px; width: 3px; border-radius: 3px; background: var(--accent-grad); }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  @media (max-width: 920px) { .grid-2 { grid-template-columns: 1fr; } }

  .col-head { display: flex; align-items: center; gap: 9px; font-size: 14px; font-weight: 750; letter-spacing: -.01em; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--hair); }
  .col-head .ic { display: inline-flex; color: var(--muted); }
  .col-count { margin-left: auto; font-size: 11.5px; font-weight: 700; color: var(--text-2); background: var(--glass-strong); border: 1px solid var(--hair); padding: 3px 10px; border-radius: 20px; }

  .item-list { display: flex; flex-direction: column; gap: 12px; }
  .item { position: relative; background: var(--glass); border: 1px solid var(--hair); border-radius: var(--radius-sm); padding: 16px 18px 16px 20px; transition: border-color .16s, transform .12s; }
  .item:hover { border-color: var(--hair-strong); transform: translateX(2px); }
  .item-link { display: block; text-decoration: none; color: inherit; cursor: pointer; }
  .item-link:hover { border-color: var(--accent); }
  .item::before { content: ''; position: absolute; left: 0; top: 12px; bottom: 12px; width: 3px; border-radius: 3px; background: var(--faint); }
  .item-high::before { background: var(--rose); }
  .item-medium::before { background: var(--amber); }
  .item-low::before { background: var(--emerald); }
  .item-promo::before { background: var(--pc, var(--amber)); }
  .item-reco::before { background: var(--accent); }
  .item-head { display: flex; align-items: center; gap: 9px; margin-bottom: 7px; flex-wrap: wrap; }
  .item-title { font-size: 15.5px; font-weight: 700; line-height: 1.4; letter-spacing: -.015em; }
  .item-detail { font-size: 14.5px; color: var(--text-2); line-height: 1.62; letter-spacing: -.005em; }
  .ext { margin-left: auto; color: var(--muted); display: inline-flex; transition: color .16s, transform .16s; }
  .item-link:hover .ext { color: var(--accent); transform: translate(2px,-2px); }
  .item-period { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600; color: var(--muted); margin-top: 11px; background: var(--glass-strong); border: 1px solid var(--hair); padding: 4px 10px; border-radius: 7px; font-family: var(--mono); }
  .item-period svg { width: 13px; height: 13px; }
  .promo-note { margin-top: 9px; font-size: 11.5px; font-weight: 600; color: var(--muted); display: flex; align-items: center; gap: 5px; opacity: .85; }
  .promo-note::before { content: 'ⓘ'; font-size: 12px; }

  .changes-block { margin-top: 30px; padding-top: 26px; border-top: 1px solid var(--hair); }

  /* 점주 대응방안 — 개조식 글머리 */
  .reco-points { list-style: none; margin-top: 8px; display: flex; flex-direction: column; gap: 6px; }
  .reco-points li { position: relative; padding-left: 16px; font-size: 14.5px; color: var(--text-2); line-height: 1.55; letter-spacing: -.005em; }
  .reco-points li::before { content: ''; position: absolute; left: 2px; top: 9px; width: 5px; height: 5px; border-radius: 50%; background: var(--accent); }
  /* 마케팅 키워드 섹션 */
  .kw-section { margin-top: 20px; padding: 18px 20px; border-radius: var(--radius-sm); border: 1px solid var(--hair); background: linear-gradient(180deg, var(--glass-strong), var(--glass)); }
  .kw-section-head { display: flex; align-items: center; gap: 8px; font-size: 14.5px; font-weight: 700; color: var(--text); margin-bottom: 15px; }
  .kw-section-head .ic { display: inline-flex; color: var(--accent-2); }
  .kw-hint { margin-left: auto; font-size: 11.5px; font-weight: 600; color: var(--muted); letter-spacing: -.01em; }
  .kw-note { display: flex; align-items: flex-start; gap: 7px; font-size: 12px; line-height: 1.5; color: var(--text-2); background: var(--glass); border: 1px dashed var(--hair); border-radius: 10px; padding: 10px 12px; margin-bottom: 14px; }
  .kw-note svg { flex: none; margin-top: 2px; color: var(--accent-2); }
  .kw-note b { color: var(--text); font-weight: 700; }
  .kw-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 720px) { .kw-cols { grid-template-columns: 1fr; } }
  .kw-block { padding: 14px 16px; border-radius: 13px; border: 1px solid var(--hair); background: var(--bg-1, var(--glass)); }
  .kw-label { font-size: 12.5px; font-weight: 700; color: var(--text-2); margin-bottom: 11px; }
  .kw-chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .kw-chip { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 600; padding: 7px 13px; border-radius: 20px; border: 1px solid var(--hair); background: var(--glass); color: var(--text-2); cursor: pointer; transition: transform .12s, box-shadow .14s, filter .14s; }
  .kw-chip:hover { transform: translateY(-1px); box-shadow: var(--card-shadow); filter: brightness(1.06); }
  .kw-chip-more { font-size: 10.5px; font-weight: 700; min-width: 16px; height: 16px; padding: 0 4px; display: inline-flex; align-items: center; justify-content: center; border-radius: 9px; background: rgba(255,255,255,.14); }
  .kw-resp .kw-chip { color: var(--amber); border-color: var(--amber-soft); background: var(--amber-soft); }
  .kw-proa .kw-chip { color: var(--accent-2); border-color: var(--accent-soft); background: var(--accent-soft); }
  /* 키워드 예시 모달 */
  .kw-modal-back { position: fixed; inset: 0; z-index: 1000; display: none; align-items: center; justify-content: center; padding: 24px; background: rgba(0,0,0,.55); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); }
  .kw-modal-back.show { display: flex; }
  .kw-modal { width: 100%; max-width: 460px; max-height: 80vh; overflow-y: auto; background: var(--glass-strong); border: 1px solid var(--hair-strong); border-radius: var(--radius); box-shadow: var(--shadow); padding: 22px 24px; backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); }
  .kw-modal-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .kw-modal-title { font-size: 18px; font-weight: 800; color: var(--text); letter-spacing: -.01em; }
  .kw-modal-x { flex: none; border: 1px solid var(--hair); background: var(--glass); color: var(--text-2); width: 30px; height: 30px; border-radius: 9px; cursor: pointer; font-size: 13px; }
  .kw-modal-x:hover { color: var(--text); }
  .kw-modal-sub { font-size: 12.5px; font-weight: 600; color: var(--muted); margin: 6px 0 16px; }
  .kw-modal-list { list-style: none; display: flex; flex-direction: column; gap: 11px; }
  .kw-modal-list li { position: relative; padding-left: 26px; font-size: 14.5px; color: var(--text); line-height: 1.55; }
  .kw-modal-list li::before { content: counter(kwc); counter-increment: kwc; position: absolute; left: 0; top: 1px; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; font-size: 10.5px; font-weight: 800; color: var(--accent-2); border-radius: 50%; background: var(--accent-soft); }
  .kw-modal-list { counter-reset: kwc; }
  .kw-modal-list li.kw-modal-empty { padding-left: 0; color: var(--muted); font-size: 13.5px; }
  .kw-modal-list li.kw-modal-empty::before { display: none; }
  .kw-modal-foot { margin-top: 16px; padding-top: 13px; border-top: 1px solid var(--hair); font-size: 11.5px; line-height: 1.5; color: var(--muted); }

  /* ── 통계 ── */
  .stat-section-title { font-size: 16px; font-weight: 750; letter-spacing: -.02em; margin: 30px 0 15px; }
  .stat-section-title:first-of-type { margin-top: 6px; }

    /* 인쇄 시 2열 + 셀 잘림 방지: grid 대신 다단(column)으로 — break-inside가 안정적으로 동작 */

<script>
// ── 아이콘 (Lucide 스타일 인라인 SVG) ──
const ICONS = {
  dashboard: '<rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/>',
  history: '<path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/>',
  building: '<path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/><path d="M10 6h4"/><path d="M10 10h4"/><path d="M10 14h4"/><path d="M10 18h4"/>',
  alert: '<path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/>',
  target: '<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>',
  bulb: '<path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/>',
  compare: '<path d="m16 3 4 4-4 4"/><path d="M20 7H4"/><path d="m8 21-4-4 4-4"/><path d="M4 17h16"/>',
  refresh: '<path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/>',
  moon: '<path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>',
  sun: '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>',
  external: '<path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>',
  calendar: '<rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18M8 2v4M16 2v4"/>',
  signal: '<path d="M2 20h.01"/><path d="M7 20v-4"/><path d="M12 20v-8"/><path d="M17 20V8"/><path d="M22 4v16"/>',
  chart: '<path d="M3 3v16a2 2 0 0 0 2 2h16"/><rect x="7" y="11" width="3" height="6" rx="1"/><rect x="12" y="7" width="3" height="10" rx="1"/><rect x="17" y="13" width="3" height="4" rx="1"/>',
};
function ic(name, size) { const s = size || 18; return `<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${ICONS[name] || ''}</svg>`; }
function initStaticIcons() { document.querySelectorAll('[data-ic]').forEach(el => { el.innerHTML = ic(el.dataset.ic, el.closest('.kpi-icon') ? 18 : 16); }); }

// ── 스파크라인 (주간 추이 미니차트) ──
let sparkSeq = 0;
function spark(values, stroke) {
  const v = (values || []).filter(x => typeof x === 'number');
  if (v.length < 2) return `<div class="spark-empty">추이는 데이터가 쌓이면 표시됩니다</div>`;
  const max = Math.max(...v), min = Math.min(...v);
  const range = (max - min) || 1, W = 100, H = 26, n = v.length;
  const pts = v.map((x, i) => [(i / (n - 1)) * W, H - 2 - ((x - min) / range) * (H - 5)]);
  const line = pts.map((p, i) => `${i ? 'L' : 'M'}${p[0].toFixed(1)} ${p[1].toFixed(1)}`).join(' ');
  const area = `M0 ${H} L` + pts.map(p => p[0].toFixed(1) + ' ' + p[1].toFixed(1)).join(' L') + ` L${W} ${H} Z`;
  const last = pts[pts.length - 1], gid = 'spk' + (sparkSeq++);
  return `<div class="spark"><svg viewBox="0 0 100 26" preserveAspectRatio="none">
    <defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${stroke}" stop-opacity=".3"/><stop offset="1" stop-color="${stroke}" stop-opacity="0"/></linearGradient></defs>
    <path d="${area}" fill="url(#${gid})"/>
    <path d="${line}" fill="none" stroke="${stroke}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" vector-effect="non-scaling-stroke"/>
    <circle cx="${last[0].toFixed(1)}" cy="${last[1].toFixed(1)}" r="2.4" fill="${stroke}" vector-effect="non-scaling-stroke"/>
  </svg></div>`;
}

let currentView = 'today';
let latestData = null;
let historyData = [];
let reportsData = [];
let communityData = null; // 커뮤니티 모니터링 데이터
let reportDate = null; // 종합리포트에서 선택한 날짜 (null=최신)
let detailDates = {}; // 업체별로 선택한 크롤 날짜 { competitorId: date } (없으면 최신)
let selectedCompetitor = null;
let isDark = true;
let hasBackend = false;

function applyTheme() {
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  const btn = document.getElementById('theme-btn');
  if (btn) btn.innerHTML = ic(isDark ? 'moon' : 'sun', 15);
}
function toggleTheme() { isDark = !isDark; localStorage.setItem('theme', isDark ? 'dark' : 'light'); applyTheme(); }
(function () { isDark = localStorage.getItem('theme') !== 'light'; document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light'); })();

function setView(view) {
  currentView = view;
  ['report', 'stats', 'community'].forEach(v => { const b = document.getElementById('nav-' + v); if (b) b.classList.toggle('active', view === v); });
  render();
}
function toggleSidebar() {
  const collapsed = document.body.classList.toggle('sidebar-collapsed');
  localStorage.setItem('sidebar', collapsed ? 'closed' : 'open');
}
function selectDetailDate(date) { if (selectedCompetitor) detailDates[selectedCompetitor] = date || null; render(); window.scrollTo({ top: 0, behavior: 'smooth' }); }

async function fetchJson(url) {
  const res = await fetch(url + '?t=' + Date.now(), { cache: 'no-store' });
  if (!res.ok) throw new Error(url + ' (' + res.status + ')');
  return res.json();
}

async function loadData() {
  setRefreshing(true);
  try {
    const [latest, history, reports] = await Promise.all([
      fetchJson('./data/latest.json').catch(() => ({ empty: true, competitors: [] })),
      fetchJson('./data/history.json').catch(() => []),
      fetchJson('./data/reports.json').catch(() => []),
    ]);
    latestData = latest;
    historyData = Array.isArray(history) ? history : [];
    reportsData = Array.isArray(reports) ? reports : [];
    fetchJson('./data/community.json').then(c => { communityData = c; if (currentView === 'community') renderCommunity(); }).catch(() => {});
    if (latestData?.createdAt) {
      const d = new Date(latestData.createdAt);
      document.getElementById('last-run-text').innerHTML =
        `마지막 업데이트<br><b>${d.toLocaleDateString('ko-KR')} ${d.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' })}</b>`;
    } else {
      document.getElementById('last-run-text').textContent = '아직 수집 전';
    }
    // 기본 선택: 자사(이투스247) 우선, 없으면 첫 업체
    if (!selectedCompetitor && latestData?.competitors?.length > 0) selectedCompetitor = (latestData.competitors.find(c => c.isSelf) || latestData.competitors[0]).id;
    renderSidebarCompetitors();
    render();
  } catch (e) {
    showToast('데이터 로드 실패: ' + e.message);
  } finally { setRefreshing(false); }
}

async function detectBackend() {
  try { const res = await fetch('/api/status', { cache: 'no-store' }); hasBackend = res.ok && (await res.json()).local === true; }
  catch { hasBackend = false; }
  const runBtn = document.getElementById('run-btn');
  if (runBtn) runBtn.style.display = hasBackend ? '' : 'none';
}

function setRefreshing(on) {
  const btn = document.getElementById('refresh-btn');
  btn.innerHTML = on ? '<span class="spinner" style="width:14px;height:14px;border-width:2px"></span>' : (ic('refresh', 15) + ' 새로고침');
  btn.disabled = on;
}

async function triggerRun() {
  const btn = document.getElementById('run-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner" style="width:13px;height:13px;border-width:2px"></span> 실행 중…';
  try {
    await fetch('/api/run', { method: 'POST' });
    showToast('크롤링 & 분석 시작! 1~2분 후 새로고침 하세요.');
    setTimeout(() => loadData(), 90000);
  } catch (e) { showToast('실행 실패: ' + e.message); }
  finally { setTimeout(() => { btn.disabled = false; btn.textContent = '지금 실행'; }, 5000); }
}

// 사이드바 분류 구조 (대분류 → 소분류 → 경쟁사 id)
const MENU = [
  { cat: '자사', companies: [
    { id: 'etoos247', name: '이투스247학원' },
  ] },
  { cat: '학원', subs: [
    { name: '독학재수학원', ids: ['itall_sparta', 'daesung_dlab', 'sumanhui_sparta', 'suneungsunbae'] },
  ] },
  // 소분류 없이 업체명만 표시
  { cat: '스터디카페', companies: [
    { id: 'jaksim', name: '작심스터디카페' },
  ] },
];

function compItem(c) {
  return `<div class="comp-item ${c.id === selectedCompetitor ? 'active' : ''}" onclick="selectCompetitor('${c.id}')">
      <span class="comp-dot"></span><span class="comp-name">${escHtml(c.name)}</span>
    </div>`;
}

function companyPlaceholder(name) {
  return `<div class="comp-item comp-item-disabled">
      <span class="comp-dot dim"></span><span class="comp-name" style="color:var(--muted)">${escHtml(name)}</span>
      <span class="comp-pending">준비중</span>
    </div>`;
}

function renderSidebarCompetitors() {
  const el = document.getElementById('comp-list');
  const comps = latestData?.competitors || [];
  const byId = Object.fromEntries(comps.map(c => [c.id, c]));
  const used = new Set();
  let html = '';
  for (const group of MENU) {
    html += `<div class="cat-group"><div class="cat-label">${escHtml(group.cat)}</div>`;
    // 소분류가 있는 경우
    for (const sub of (group.subs || [])) {
      html += `<div class="sub-label">${escHtml(sub.name)}</div>`;
      const items = sub.ids.map(id => { used.add(id); return byId[id]; }).filter(Boolean);
      html += items.length ? items.map(compItem).join('') : `<div class="comp-empty">준비중</div>`;
    }
    // 소분류 없이 업체명만 나열하는 경우
    for (const co of (group.companies || [])) {
      used.add(co.id);
      html += byId[co.id] ? compItem(byId[co.id]) : companyPlaceholder(co.name);
    }
    html += `</div>`;
  }
  // MENU에 분류되지 않은 데이터는 '기타'로 노출 (누락 방지)
  const others = comps.filter(c => !used.has(c.id));
  if (others.length) html += `<div class="cat-group"><div class="cat-label">기타</div>${others.map(compItem).join('')}</div>`;
  el.innerHTML = html;
}

function selectCompetitor(id) {
  selectedCompetitor = id;
  if (currentView !== 'today') { setView('today'); }
  renderSidebarCompetitors();
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function render() {
  if (currentView === 'stats') renderStats();
  else if (currentView === 'report') renderReport();
  else if (currentView === 'community') renderCommunity();
  else renderToday();
}
let COMM_FILTER = { brand: '', community: '', sentiment: '', q: '', from: '', to: '' };
function setCommFilter(k, v) { COMM_FILTER[k] = v; renderCommunity(); }
const BRAND_ORDER = ['이투스247', '잇올', '디랩', '러셀', '수만휘'];
// 통계 차트 키컬러와 동일 (이투스247·잇올·수만휘·대성디랩 매칭, 러셀은 별도 보라)
const COMM_BRAND_COLORS = { '이투스247': '#FF8329', '잇올': '#C40F06', '수만휘': '#12B886', '디랩': '#FFD43B', '러셀': '#7048E8' };
function brandColor(s) { const t = brandTokens(s)[0] || ''; const bg = COMM_BRAND_COLORS[t] || 'var(--accent-2)'; const fg = (bg === '#FFD43B') ? '#3a2f00' : '#fff'; return { bg, fg }; }
function brandTokens(s) { return (s || '').split(/[,\s/·]+/).map(x => x.trim()).filter(Boolean); }
function normComm(c) { let v = (c || '').replace(/^[.\s]+/, '').trim(); return v; }
function loadCommunity(cb) {
  fetchJson('./data/community.json').then(c => { communityData = c; if (currentView === 'community') renderCommunity(); if (cb) cb(true); }).catch(() => { if (cb) cb(false); });

function classifyPromo(p) {
  const t = ((p.title || '') + ' ' + (p.detail || '')).toLowerCase();
  const hits = KEYWORDS.filter(k => k.terms.some(term => t.includes(term.toLowerCase()))).map(k => k.key);

// 통계 키워드 유형은 모든 학원 동일하게 고정 노출 (없으면 0)
const ALL_CATS = KEYWORDS.map(k => k.key).concat('기타');
function monthsOf(p) {
  const s = (p.period || '') + ' ' + (p.title || '');
  const months = new Set();
  let m;
  const re = /(\d{4})[.\-\/\s]+(\d{1,2})/g;
  while ((m = re.exec(s))) { const mo = +m[2]; if (mo >= 1 && mo <= 12) months.add(mo); }
  const re2 = /(\d{1,2})\s*월/g;
  while ((m = re2.exec(s))) { const mo = +m[1]; if (mo >= 1 && mo <= 12) months.add(mo); }
  if (!months.size) return /상시|연중|수시|상시진행/.test(s) ? ['상시'] : ['기타'];
  return [...months];
}

      const h = base - Y(v);
      const neon = s.isSelf ? ` stroke="#FFCE99" stroke-width="1.6" filter="url(#neonGlow)"` : '';
      const tip = escHtml(`${s.name} · ${c} : ${v}개`);
      // 값 0도 hover 감지되도록 최소 높이의 투명 영역 보장
      const drawH = Math.max(h, 0), hitY = Math.min(Y(v), base - 3);
      bars += `<rect class="lc-hit" x="${(gx + j * barW).toFixed(1)}" y="${hitY.toFixed(1)}" width="${(barW - 1.2).toFixed(1)}" height="${(base - hitY).toFixed(1)}" fill="transparent" data-tip="${tip}"/>`;
      if (drawH > 0) bars += `<rect class="lc-bar" x="${(gx + j * barW).toFixed(1)}" y="${Y(v).toFixed(1)}" width="${(barW - 1.2).toFixed(1)}" height="${drawH.toFixed(1)}" rx="1.5" style="fill:${fill};pointer-events:none"${neon}/>`;
    });
  });
  // 카테고리 사이 세로 구분선 (경계 1..n-1)
  let seps = '';
  for (let i = 1; i < n; i++) { const sx = L + slot * i; seps += `<line x1="${sx.toFixed(1)}" y1="${T}" x2="${sx.toFixed(1)}" y2="${base.toFixed(1)}" class="lc-sep"/>`; }
  const xlabels = cats.map((c, i) => { const cx = L + slot * i + slot / 2; return `<text x="${cx.toFixed(1)}" y="${H - B + 18}" class="lc-xtick" text-anchor="end" transform="rotate(-32 ${cx.toFixed(1)} ${H - B + 18})">${escHtml(c)}</text>`; }).join('');
  return `<div class="card chart-card">
    <div class="lc-legend">${chartLegend(series)}</div>
    <svg viewBox="0 0 ${W} ${H}" class="line-chart" preserveAspectRatio="xMidYMid meet">
      <defs><filter id="neonGlow" x="-60%" y="-60%" width="220%" height="220%"><feDropShadow dx="0" dy="0" stdDeviation="2.6" flood-color="#FF8329" flood-opacity="0.95"/></filter></defs>
      <text x="${W - R}" y="11" text-anchor="end" class="lc-unit">(개)</text>
      ${grid}${seps}
      <line x1="${L}" y1="${T}" x2="${L}" y2="${base.toFixed(1)}" class="lc-axis"/>
      <line x1="${L}" y1="${base.toFixed(1)}" x2="${W - R}" y2="${base.toFixed(1)}" class="lc-axis"/>
      ${bars}${xlabels}
    </svg>
  </div>`;
}

// 월별 프로모션 목록 (시기별 차트에서 막대 클릭 시 표시)
let STAT_MONTHS = {};
function selectStatMonth(m) {
  const key = String(m);

  document.querySelectorAll('.stat-chip').forEach(el => el.classList.toggle('chip-active', el.dataset.m === key));

  if (!box) return;

  const label = (key === '상시') ? '상시 진행' : (key === '기타') ? '기간 미상' : key + '월';
  if (!list.length) { box.innerHTML = `<div class="empty-val">${escHtml(label)}에 해당하는 프로모션이 없습니다</div>`; return; }
  box.innerHTML = `<div class="md-head">${escHtml(label)} 프로모션 <span class="col-count num">${list.length}</span></div>

        <div class="item-head"><span class="md-academy">${escHtml(x.academy)}</span><div class="item-title">${escHtml(x.p.title)}</div><span class="ext">${ic('external', 15)}</span></div>
        <div class="item-detail">${escHtml(x.p.detail || '')}</div>

function renderStats() {
  const el = document.getElementById('content');
  const records = historyData.length ? historyData : (latestData && !latestData.empty ? [latestData] : []);
  if (!records.length) { el.innerHTML = `<div class="empty"><div class="empty-icon">${ic('chart', 44)}</div><p>통계를 낼 데이터가 아직 없습니다.</p></div>`; return; }

  // 학원별 '고유 프로모션' 집계 — id로 묶고(이름 인코딩 깨짐 방지) 제목 기준 중복 제거
  const per = {}; const order = [];
  for (const rec of records) {
    for (const c of (rec.competitors || [])) {
      if (!c.analysis?.promotions?.length) continue;
      const id = c.id || c.name;
      if (!per[id]) { per[id] = { name: c.name, url: c.url, isSelf: !!c.isSelf, map: new Map() }; order.push(id); } // 최신(맨 앞) 레코드의 이름/주소 사용
      for (const p of c.analysis.promotions) { const k = (p.title || '').trim(); if (k && !per[id].map.has(k)) per[id].map.set(k, p); }
    }
  }
  const academies = order.map(id => ({ id, name: per[id].name, url: per[id].url, isSelf: per[id].isSelf, promos: [...per[id].map.values()] }));
  const selfAcademy = academies.find(a => a.isSelf) || null;
  const comps = academies.filter(a => !a.isSelf);
  const totalPromos = comps.reduce((s, a) => s + a.promos.length, 0);
  const SELF_COLOR = chartColorOf({ id: 'etoos247', isSelf: true }); // #FF8329, 차트와 통일

  // 키워드 유형별 카운트
  const countsOf = (promos) => { const c = {}; promos.forEach(p => classifyPromo(p).forEach(k => c[k] = (c[k] || 0) + 1)); return c; };
  const selfCounts = selfAcademy ? countsOf(selfAcademy.promos) : {};
  const selfTotal = selfAcademy ? selfAcademy.promos.length : 0;

  // 경쟁사 vs 자사 비교 막대 (모두 solid, 학원별 키컬러는 차트와 동일 / 자사는 네온 글로우)
  const cmpRow = (label, vc, vs, max, color) => `<div class="cmp-row">
      <div class="bar-label">${escHtml(label)}</div>
      <div class="cmp-bars">
        <div class="cmp-bar"><i style="width:${(vc / max * 100).toFixed(0)}%;background:${color}"></i></div>
        <div class="cmp-bar"><i class="sbar" style="width:${(vs / max * 100).toFixed(0)}%;background:${SELF_COLOR}"></i></div>
      </div>
      <div class="cmp-vals"><span class="num" style="color:${color}">${vc}</span><span class="num self">${vs}</span></div>
    </div>`;
  const legend = (color) => `<div class="cmp-legend"><span><i class="dot" style="background:${color}"></i>경쟁사</span><span><i class="dot" style="background:${SELF_COLOR}"></i>자사(이투스247)</span></div>`;

  // 자사 단독 막대행 — 경쟁사 cmp-row와 동일 구조(2번째 막대만 숨김)로 높이 완전 일치
  const selfRow = (label, v, max) => `<div class="cmp-row">
      <div class="bar-label">${escHtml(label)}</div>
      <div class="cmp-bars">
        <div class="cmp-bar"><i class="sbar" style="width:${(v / max * 100).toFixed(0)}%;background:${SELF_COLOR}"></i></div>
        <div class="cmp-bar" style="visibility:hidden"></div>
      </div>
      <div class="cmp-vals"><span class="num self">${v}</span><span class="num" style="visibility:hidden">0</span></div>
    </div>`;

  // 자사 기준 카드 (맨 앞)
  const selfCard = selfAcademy ? (() => {
    const rows = ALL_CATS.map(k => [k, selfCounts[k] || 0]);
    const max = Math.max(1, ...rows.map(r => r[1]));
    const top = selfTotal ? rows.slice().sort((x, y) => y[1] - x[1])[0][0] : '-';
    return `<div class="card stat-card stat-card-self">
      <div class="stat-card-head">${escHtml(selfAcademy.name)} <span class="self-tag">자사 기준</span><span class="col-count num">${selfTotal}건</span></div>
      <div class="stat-top">주력: <b style="color:${SELF_COLOR}">${escHtml(top)}</b></div>
      <div aria-hidden="true" style="visibility:hidden">${legend(SELF_COLOR)}</div>
      ${rows.map(([k, v]) => selfRow(k, v, max)).join('')}
    </div>`;
  })() : '';

  // 경쟁사 카드 — 학원별 키컬러(차트와 동일), 카테고리마다 자사와 비교
  const academyCards = comps.map(a => {
    const color = chartColorOf(a);
    const counts = countsOf(a.promos);
    const rows = ALL_CATS.map(k => [k, counts[k] || 0, selfCounts[k] || 0]);
    const max = Math.max(1, ...rows.flatMap(r => [r[1], r[2]]));
    const top = a.promos.length ? rows.slice().sort((x, y) => y[1] - x[1])[0][0] : '-';
    return `<div class="card stat-card">
      <div class="stat-card-head">${escHtml(a.name)}<span class="col-count num">${a.promos.length}건</span></div>
      <div class="stat-top">주력: <b style="color:${color}">${escHtml(top)}</b>${selfAcademy ? ` · 자사 ${selfTotal}건 대비` : ''}</div>
      ${selfAcademy ? legend(color) : ''}
      ${rows.map(([k, vc, vs]) => selfAcademy ? cmpRow(k, vc, vs, max, color) : barRow(k, vc, max, color)).join('')}
    </div>`;
  }).join('');

  // 시기별(월) 분포 + 월별 프로모션 목록 (경쟁사 기준)
  STAT_MONTHS = {};
  comps.forEach(a => a.promos.forEach(p => {
    const color = chartColorOf(a);
    monthsOf(p).forEach(x => { const k = String(x); (STAT_MONTHS[k] = STAT_MONTHS[k] || []).push({ academy: a.name, url: a.url, color, p }); });
  }));
  const mc = {}; for (let i = 1; i <= 12; i++) mc[i] = (STAT_MONTHS[i] || []).length;
  const maxM = Math.max(1, ...Object.values(mc));
  let cols = '';
  for (let i = 1; i <= 12; i++) cols += `<div class="col" data-m="${i}" onclick="selectStatMonth(${i})"><div class="col-num num">${mc[i] || ''}</div><div class="col-bar" style="height:${(mc[i] / maxM * 100).toFixed(0)}%"></div><div class="col-cap">${i}월</div></div>`;
  const always = (STAT_MONTHS['상시'] || []).length, etc = (STAT_MONTHS['기타'] || []).length;
  const chips = (always ? `<span class="stat-chip" data-m="상시" onclick="selectStatMonth('상시')">상시 진행 ${always}</span>` : '')
    + (etc ? `<span class="stat-chip" data-m="기타" onclick="selectStatMonth('기타')">기간 미상 ${etc}</span>` : '');

  // 전체 키워드 분포 (경쟁사 기준)
  const all = {}; comps.forEach(a => a.promos.forEach(p => classifyPromo(p).forEach(k => all[k] = (all[k] || 0) + 1)));
  const allRows = ALL_CATS.map(k => [k, all[k] || 0]); const allMax = Math.max(1, ...allRows.map(r => r[1]));

  // 전 학원(자사 포함) 유형별 비교 막대그래프
  const chartAcads = [selfAcademy, ...comps].filter(Boolean);
  const barChart = buildBarChart(chartAcads, ALL_CATS, countsOf);

  el.innerHTML = `
    <div class="page-head"><div><div class="page-title">통계 현황</div><div class="page-sub">경쟁사 고유 프로모션 ${totalPromos}건${selfAcademy ? ` · 자사 ${selfTotal}건` : ''} 기준 · 키워드/시기별 분석</div></div></div>

    <div class="stat-section-title">📊 학원별 마케팅 유형 빈도 비교 분석 <span class="sec-sub">자사 포함 전체를 한눈에</span></div>
    ${barChart}

    <div class="stat-section-title">🏫 학원별 마케팅 유형 <span class="sec-sub">경쟁사 카드는 자사(이투스247)와 유형별 비교</span></div>
    <div class="stat-grid">${selfCard}${academyCards}</div>

    <div class="stat-section-title">📅 시기별 프로모션 분포 ${chips}</div>
    <div class="card chart-card">
      <div class="col-chart">${cols}</div>
      <div id="month-detail" class="month-detail"></div>
    </div>

    <div class="stat-section-title">🔑 전체 키워드 분포</div>
    <div class="card chart-card">${allRows.map(([k, v]) => barRow(k, v, allMax)).join('')}</div>
  `;

  // 기본 선택: 가장 건수가 많은 달 (없으면 상시/기타)
  let def = 1, best = -1;
  for (let i = 1; i <= 12; i++) if (mc[i] > best) { best = mc[i]; def = i; }
  selectStatMonth(best > 0 ? def : (always ? '상시' : (etc ? '기타' : 1)));
}

// ── 종합 리포트 ──
function kwExamplesBlock(list, cls, showReq) {
  if (!Array.isArray(list) || !list.length) return '<div class="empty-val" style="grid-column:1/-1">데이터 없음</div>';
  return list.map((k, i) => {
    const kw = (typeof k === 'string') ? { keyword: k, examples: [] } : (k || {});
    const rank = (e) => { const by = (e && typeof e === 'object') ? e.by : null; return by === '본사' ? 0 : by === '가맹점' ? 1 : 2; };
    const ex = (Array.isArray(kw.examples) ? kw.examples.slice() : []).sort((a, b) => rank(a) - rank(b)).slice(0, 3);
    const li = ex.map(e => {
      const text = (typeof e === 'string') ? e : (e && e.text || '');
      const by = (e && typeof e === 'object') ? e.by : null;
      const tag = by ? `<span class="rep-owner ${by === '본사' ? 'owner-hq' : 'owner-fc'}">${escHtml(by)}</span>` : '';
      const reqBtn = showReq ? `<button type="button" class="hq-req" onclick="requestHQ(event, this)" data-kw="${escHtml(kw.keyword || '')}" data-tx="${escHtml(text)}">본사 요청</button>` : '';
      return `<li><span class="li-tx">${tag}${escHtml(text)}</span>${reqBtn}</li>`;
    }).join('');
    return `<div class="rep-kw ${cls}">
      <div class="rep-kw-name"><span class="rep-kw-no">${i + 1}</span><span class="rep-kw-txt">${escHtml(kw.keyword || '')}</span>${ex.length ? `<button type="button" class="rep-more" onclick="repToggle(this)">더보기</button>` : ''}</div>
      ${ex.length ? `<ul class="rep-ul">${li}</ul>` : ''}
    </div>`;
  }).join('');
}
function repToggle(btn) { const card = btn.closest('.rep-kw'); const open = card.classList.toggle('open'); btn.textContent = open ? '접기' : '더보기'; }
async function requestHQ(ev, btn) {
  if (ev) ev.stopPropagation();
  if (btn && btn.disabled) return;
  const orig = btn ? btn.textContent : '';
  if (btn) { btn.disabled = true; btn.textContent = '전송 중…'; }
  try {
    const res = await fetch('/api/notify', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ kw: btn ? btn.getAttribute('data-kw') : '', tx: btn ? btn.getAttribute('data-tx') : '' }),
    });
    if (res.ok) { showToast('본사에 요청을 전송했습니다'); if (btn) { btn.textContent = '✓ 요청 완료'; btn.classList.add('done'); } }
    else { showToast('전송 실패 — 잠시 후 다시 시도해주세요'); if (btn) { btn.disabled = false; btn.textContent = orig; } }
  } catch (e) {
    showToast('전송 오류 — 네트워크를 확인해주세요'); if (btn) { btn.disabled = false; btn.textContent = orig; }
  }
}
function repSecToggle(h) { const sec = h.closest('.rep-sec'); sec.classList.toggle('collapsed'); }
// 막대그래프 hover 툴팁 (이벤트 위임 — 렌더 후에도 동작)
(function () {
  const tip = () => document.getElementById('chart-tip');
  // body에 zoom:1.13이 걸려 fixed 좌표가 배율만큼 어긋남 → 배율 보정해 커서에 딱 붙임
  const Z = 1.13;
  const place = (el, e) => { el.style.left = (e.clientX / Z + 12) + 'px'; el.style.top = (e.clientY / Z + 14) + 'px'; };
  document.addEventListener('mouseover', e => {
    const t = e.target.closest && e.target.closest('.lc-hit'); if (!t) return;
    const el = tip(); if (!el) return; el.textContent = t.getAttribute('data-tip') || ''; el.classList.add('show'); place(el, e);
  });
  document.addEventListener('mousemove', e => {
    const el = tip(); if (!el || !el.classList.contains('show')) return;
    place(el, e);
  });
  document.addEventListener('mouseout', e => {
    if (e.target.closest && e.target.closest('.lc-hit')) { const el = tip(); if (el) el.classList.remove('show'); }
  });
})();
function repGridList(items, cls, gridCls) {

    <div id="report-doc" class="report-doc card">
      <div class="rep-title">경쟁사 종합 분석 및 자사 대응 전략 리포트</div>
      <div class="rep-meta">작성 기준일 ${dateStr} · 분석 대상: ${escHtml(compNames)} · 자사: 이투스247학원</div>
      ${(rep?.weeklyHighlights || []).length ? `<div class="rep-highlight">
        <div class="rep-highlight-t">${ic('bulb', 15)} 이번 주 핵심</div>
        <ol class="rep-highlight-l">${rep.weeklyHighlights.slice(0, 3).map(h => `<li>${escHtml(h)}</li>`).join('')}</ol>
      </div>` : ''}

      <div class="rep-sec">
        <div class="rep-h">1. 원장님, 이렇게 하는 것을 추천합니다 <span class="rep-h-sub">(우선순위 핵심 3가지)</span></div>
        ${(rep?.storeActions || []).length ? repGridList(rep.storeActions.slice(0, 3), 'rep-action', 'rep-grid-3') : '<div class="empty-val">데이터 없음</div>'}
      </div>

      <div class="rep-sec">
        <div class="rep-h">2. 종합 마케팅 키워드 &amp; 실행 예시</div>
        <div class="rep-owner-legend"><span class="rep-owner owner-hq">본사</span> 비용·인력·시스템이 큰 본사 차원 &nbsp;<span class="rep-owner owner-fc">가맹점</span> 지점이 자체 실행 가능 (본사 먼저 정렬)</div>
        <div class="rep-sub-h rep-resp">추천 대응 키워드 <span class="rep-sub-tag">경쟁사 맞대응${isFC ? ' · 본사 지원이 필요하면 「본사 요청」' : ''}</span></div>
        <div class="rep-kw-grid">${kwExamplesBlock(rep?.responseKeywords, 'rep-resp', isFC)}</div>
        ${isFC ? '' : `<div class="rep-sub-h rep-proa">선제적 키워드 <span class="rep-sub-tag">선점 전략</span></div>
        <div class="rep-kw-grid">${kwExamplesBlock(rep?.proactiveKeywords, 'rep-proa')}</div>`}
      </div>

      <div class="rep-sec">
        <div class="rep-h">3. 자사 vs 경쟁사 비교 <span class="rep-h-sub">(통계 데이터 기반)</span></div>
        ${rep?.comparisonSummary ? `<p class="rep-p">${escHtml(rep.comparisonSummary)}</p>` : noRep}
        ${briefs}
        <div class="rep-table-wrap"><table class="rep-table">${tableHead}${tableBody}${tableFoot}</table></div>
        <div class="rep-cap">※ 한 프로모션이 여러 유형에 분류될 수 있어 유형 합계는 고유 프로모션 수보다 클 수 있음.</div>
      </div>

      ${isFC ? '' : `<div class="rep-sec rep-conclusion">
        <div class="rep-h rep-h-toggle" onclick="repSecToggle(this)">4. 인사이트 총정리 <span class="rep-h-sub">(자사 프로모션 기획·대응 방향)</span><span class="rep-sec-caret">▾</span></div>
        <div class="rep-sec-body">${(rep?.conclusion || []).length ? repGridList(rep.conclusion, 'rep-concl') : '<div class="empty-val">데이터 없음</div>'}</div>
      </div>`}

      <div class="rep-foot">본 리포트는 경쟁사 공개 홈페이지 수집 데이터를 Gemini AI가 분석·종합해 작성한 참고 자료입니다. · 이투스ECI 가맹사업성장실 기획팀</div>

}

function reportDocHtml() {
  const doc = document.getElementById('report-doc');
  return doc ? doc.innerHTML : '';
}
function downloadReportWord() {
  const inner = reportDocHtml();
  if (!inner) return;
  const dateStr = reportDate || (latestData?.createdAt ? new Date(latestData.createdAt).toISOString().slice(0, 10) : 'report');
  const css = `body{font-family:'맑은 고딕','Malgun Gothic',sans-serif;color:#1a1a1a;font-size:11pt;line-height:1.6}
    .rep-title{font-size:18pt;font-weight:bold;margin-bottom:6pt}
    .rep-meta{font-size:9pt;color:#666;margin-bottom:16pt}
    .rep-h{font-size:13pt;font-weight:bold;color:#0a6;border-bottom:1.5pt solid #0a6;padding-bottom:3pt;margin:16pt 0 8pt}
    .rep-h-sub,.rep-sub-h{font-size:10pt;color:#555}
    .rep-sub-h{font-weight:bold;margin:10pt 0 4pt}
    .rep-kw-name{font-weight:bold;margin-top:6pt}
    table{border-collapse:collapse;width:100%;font-size:10pt;margin:8pt 0}
    th,td{border:1pt solid #bbb;padding:4pt 6pt;text-align:center}
    th{background:#eef;}
    td:first-child,th:first-child{text-align:left}
    ul{margin:4pt 0 4pt 0;padding-left:18pt} li{margin:2pt 0}
    .rep-cap,.rep-foot{font-size:8.5pt;color:#888;margin-top:6pt}`;
  const html = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="utf-8"><style>${css}</style></head><body>${inner}</body></html>`;
  const blob = new Blob(['﻿', html], { type: 'application/msword' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `종합전략리포트_${dateStr}.doc`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
  showToast('워드 파일을 다운로드했습니다');
}
function downloadReportPDF() {
  showToast('인쇄 창에서 「PDF로 저장」을 선택하세요');
  setTimeout(() => window.print(), 400);
}

function renderHistory() {
  const el = document.getElementById('content');
  el.innerHTML = `
    <div class="page-head"><div><div class="page-title">히스토리</div><div class="page-sub">최근 ${historyData.length}회 수집 이력</div></div></div>
    ${!historyData.length
      ? `<div class="empty"><div class="empty-icon">${ic('history', 44)}</div><p>히스토리가 없습니다.</p></div>`
      : `<div class="history-list">${historyData.map(r => `
          <div class="history-item" onclick="loadHistoryDate('${r.date}')">
            <div>
              <div class="history-date">${formatDate(r.date)}</div>
              <div class="history-sum">${r.competitors.map(c => `${escHtml(c.name)}: ${escHtml(c.analysis?.summary || '-')}`).join(' · ')}</div>
            </div>
            <span class="ext" style="color:var(--muted)">${ic('external', 16)}</span>
          </div>`).join('')}</div>`}`;
}

function loadHistoryDate(date) {
  const data = historyData.find(r => r.date === date);
  if (!data) { showToast('해당 날짜 데이터 없음'); return; }
  latestData = data;
  selectedCompetitor = (data.competitors?.find(c => c.isSelf) || data.competitors?.[0])?.id;
  renderSidebarCompetitors();
  setView('today');
  showToast(formatDate(date) + ' 기록을 표시합니다');
}

function chgTag(type) { const t = ['신규', '종료', '변경'].includes(type) ? type : '변경'; return `<span class="chg-tag chg-${t}">${t}</span>`; }
// 점주 대응방안: 개조식 글머리 기호. points 배열이면 그대로, 옛 detail 문자열이면 줄바꿈 기준 분리
function recoPoints(r) {
  let pts = Array.isArray(r.points) ? r.points : [];
  if (!pts.length && r.detail) pts = String(r.detail).split(/\n|·|•|(?:^|\s)-\s/).map(s => s.trim()).filter(Boolean);
  if (!pts.length) return '';
  return `<ul class="reco-points">${pts.map(p => `<li>${escHtml(p)}</li>`).join('')}</ul>`;
}
function keywordBlock(label, list, cls) {
  if (!Array.isArray(list) || !list.length) return '';
  const chips = list.map(k => {
    const kw = (typeof k === 'string') ? { keyword: k, examples: [] } : (k || {});
    const word = kw.keyword || '';
    if (!word) return '';
    const ex = Array.isArray(kw.examples) ? kw.examples : [];
    const exAttr = escHtml(JSON.stringify(ex));
    return `<button type="button" class="kw-chip" data-kw="${escHtml(word)}" data-ex="${exAttr}" onclick="openKwModal(this)">${escHtml(word)}${ex.length ? `<span class="kw-chip-more">${ex.length}</span>` : ''}</button>`;
  }).join('');
  return `<div class="kw-block"><div class="kw-label">${escHtml(label)}</div><div class="kw-chips ${cls}">${chips}</div></div>`;
}
function openKwModal(el) {
  const kw = el.getAttribute('data-kw') || '';
  let ex = [];
  try { ex = JSON.parse(el.getAttribute('data-ex') || '[]'); } catch (e) {}
  document.getElementById('kwModalTitle').textContent = kw;
  const list = document.getElementById('kwModalList');
  list.innerHTML = ex.length
    ? ex.map(e => `<li>${escHtml(e)}</li>`).join('')
    : `<li class="kw-modal-empty">예시 준비중 — 다음 분석부터 표시됩니다.</li>`;
  document.getElementById('kwModal').classList.add('show');
}
function closeKwModal() { document.getElementById('kwModal').classList.remove('show'); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeKwModal(); });
function escHtml(s) { if (!s) return ''; return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
function formatDate(d) { return new Date(d).toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' }); }
function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); }

// ── 간이 역할 인증 (본사/가맹점 코드) ── 코드 변경은 아래 ACCESS_CODES만 수정
const ACCESS_CODES = { 'etoossuper': 'hq', 'etoos247': 'fc' };
function getRole() { return localStorage.getItem('role'); } // 로그인 유지 (전환 버튼으로만 해제)
function submitLogin() {
  const v = (document.getElementById('login-code').value || '').trim();
  const role = ACCESS_CODES[v];
  if (!role) { document.getElementById('login-err').textContent = '코드가 올바르지 않습니다.'; return; }
  localStorage.setItem('role', role);
  document.getElementById('login-gate').classList.remove('show');
  startApp();
}
function logout() { localStorage.removeItem('role'); location.reload(); }
function startApp() {
  updateRoleUI();
  detectBackend();
  loadData();
}
function updateRoleUI() {
  const el = document.getElementById('role-indic');
  if (el) el.innerHTML = `현재 접속: <b>${getRole() === 'hq' ? '본사' : '가맹점'}</b> · <a href="#" onclick="logout();return false">전환</a>`;
}

initStaticIcons();
applyTheme();
if (localStorage.getItem('sidebar') === 'closed') document.body.classList.add('sidebar-collapsed');
if (getRole()) startApp();
else document.getElementById('login-gate').classList.add('show');
</script>
