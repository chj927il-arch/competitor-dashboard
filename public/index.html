<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>경쟁사 모니터링 대시보드</title>
<style>
  :root {
    --bg: #0f1117; --bg2: #181c27; --bg3: #1e2335;
    --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14);
    --text: #e8eaf0; --muted: #7a7f96;
    --accent: #4f6ef7; --accent2: #6c8eff; --accent-bg: rgba(79,110,247,0.12);
    --green: #34d399; --amber: #fbbf24; --red: #f87171;
    --red-bg: rgba(248,113,113,0.1); --amber-bg: rgba(251,191,36,0.1); --green-bg: rgba(52,211,153,0.1);
    --radius: 10px; --radius-lg: 16px;
    --shadow: 0 2px 12px rgba(0,0,0,0.3);
  }
  [data-theme="light"] {
    --bg: #f4f6fb; --bg2: #ffffff; --bg3: #f0f2f8;
    --border: rgba(0,0,0,0.08); --border2: rgba(0,0,0,0.14);
    --text: #1a1d2e; --muted: #6b7280;
    --accent: #3b5bdb; --accent2: #4263eb; --accent-bg: rgba(59,91,219,0.08);
    --green: #059669; --amber: #d97706; --red: #dc2626;
    --red-bg: rgba(220,38,38,0.08); --amber-bg: rgba(217,119,6,0.08); --green-bg: rgba(5,150,105,0.08);
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif; font-size: 16px; line-height: 1.65; min-height: 100vh; transition: background .2s, color .2s; }

  /* 헤더 */
  .header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 14px 28px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow); }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .logo { width: 34px; height: 34px; border-radius: 9px; background: var(--accent); display: grid; place-items: center; font-size: 16px; font-weight: 700; color: #fff; flex-shrink: 0; }
  .header h1 { font-size: 19px; font-weight: 700; }
  .header-meta { font-size: 13px; color: var(--muted); margin-top: 2px; }
  .header-actions { display: flex; align-items: center; gap: 8px; }

  /* 버튼 */
  .btn { padding: 7px 15px; border-radius: var(--radius); border: none; font-size: 13px; font-weight: 500; cursor: pointer; transition: opacity .15s, transform .1s; display: flex; align-items: center; gap: 6px; }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { opacity: 0.88; }
  .btn-ghost { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: var(--border2); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-icon { padding: 7px 10px; font-size: 15px; }

  /* 뱃지 */
  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px; font-size: 13px; font-weight: 600; }
  .badge-high { background: var(--red-bg); color: var(--red); }
  .badge-medium { background: var(--amber-bg); color: var(--amber); }
  .badge-low { background: var(--green-bg); color: var(--green); }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  /* 뷰 토글 */
  .view-toggle { display: flex; gap: 3px; background: var(--bg3); border-radius: var(--radius); padding: 3px; border: 1px solid var(--border); }
  .view-btn { padding: 5px 13px; border-radius: 7px; font-size: 12px; font-weight: 500; cursor: pointer; border: none; background: transparent; color: var(--muted); transition: all .15s; }
  .view-btn.active { background: var(--bg2); color: var(--text); box-shadow: var(--shadow); }

  /* 메인 */
  .main { max-width: 1200px; margin: 0 auto; padding: 28px 24px; }
  .section-title { font-size: 14px; font-weight: 700; color: var(--text); letter-spacing: .01em; margin-bottom: 14px; }

  /* 요약 카드 그리드 */
  .summary-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .summary-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px 18px; cursor: pointer; transition: border-color .15s, box-shadow .15s; }
  .summary-card:hover { border-color: var(--border2); box-shadow: var(--shadow); }
  .summary-card.urgent { border-color: rgba(248,113,113,0.4); }
  .summary-card.active-card { border-color: var(--accent); background: var(--accent-bg); }
  .summary-name { font-size: 18px; font-weight: 700; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .summary-text { font-size: 14px; color: var(--muted); line-height: 1.55; }
  .promo-count { margin-top: 10px; font-size: 13px; color: var(--amber); font-weight: 600; }

  /* 탭 */
  .tabs { display: flex; gap: 4px; margin-bottom: 18px; overflow-x: auto; padding-bottom: 2px; }
  .tab { padding: 9px 18px; border-radius: var(--radius); font-size: 15px; font-weight: 500; cursor: pointer; white-space: nowrap; display: flex; align-items: center; gap: 7px; border: 1px solid var(--border); background: transparent; color: var(--muted); transition: all .15s; }
  .tab:hover { border-color: var(--border2); color: var(--text); }
  .tab.active { background: var(--accent-bg); border-color: var(--accent); color: var(--accent2); }

  /* 상세 카드 */
  .detail-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 28px 30px; box-shadow: var(--shadow); }
  .detail-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 22px; }
  .detail-name { font-size: 28px; font-weight: 800; margin-bottom: 6px; letter-spacing: -0.01em; }
  .detail-meta { font-size: 13px; color: var(--muted); }
  .detail-meta a { color: var(--muted); text-decoration: none; }
  .detail-meta a:hover { color: var(--accent2); }
  .urgency-block { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; }
  .urgency-reason { font-size: 13px; color: var(--muted); text-align: right; max-width: 240px; line-height: 1.5; }

  /* 요약 박스 */
  .summary-box { background: var(--bg3); border-radius: var(--radius); padding: 18px 20px; margin-bottom: 26px; font-size: 17px; font-weight: 500; line-height: 1.65; border-left: 4px solid var(--accent); }

  /* 분석 그리드 — 프로모션 ↔ 대응방안 좌우 병렬 */
  .analysis-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 8px; align-items: start; }
  @media (max-width: 760px) { .analysis-grid { grid-template-columns: 1fr; } }

  /* 열 제목 — 색상 구분 */
  .col-promo .section-title { color: var(--amber); }
  .col-reco .section-title { color: var(--accent2); }

  /* 변경사항 — 전체 너비 */
  .changes-section { margin-top: 4px; }

  /* 구분선 */
  .divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

  /* 아이템 */
  .item-list { display: flex; flex-direction: column; gap: 10px; }
  .item { background: var(--bg3); border-radius: var(--radius); padding: 16px 18px; border-left: 4px solid transparent; }
  .item-high { border-color: var(--red); }
  .item-medium { border-color: var(--amber); }
  .item-low { border-color: var(--green); }
  .item-default { border-color: var(--border2); }
  .item-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; line-height: 1.45; }
  .item-detail { font-size: 15px; color: var(--text); opacity: 0.82; line-height: 1.6; }
  .item-meta { font-size: 13px; color: var(--muted); margin-top: 8px; }
  .item-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }

  /* 히스토리 */
  .history-list { display: flex; flex-direction: column; gap: 8px; }
  .history-item { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; cursor: pointer; transition: background .15s, border-color .15s; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .history-item:hover { border-color: var(--border2); background: var(--bg3); }

  /* 빈 상태 */
  .empty { text-align: center; padding: 60px 24px; color: var(--muted); }
  .empty-icon { font-size: 44px; margin-bottom: 14px; }

  /* 스피너 */
  .spinner { width: 18px; height: 18px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* 토스트 */
  #toast { position: fixed; bottom: 24px; right: 24px; z-index: 999; background: var(--bg2); border: 1px solid var(--border2); padding: 12px 18px; border-radius: var(--radius); font-size: 13px; box-shadow: var(--shadow); opacity: 0; transform: translateY(8px); transition: all .25s; pointer-events: none; }
  #toast.show { opacity: 1; transform: translateY(0); }

  /* 크롤링 실패 배너 */
  .crawl-fail { background: var(--red-bg); color: var(--red); border-radius: var(--radius); padding: 10px 14px; font-size: 13px; margin-bottom: 16px; }

  /* 빈값 */
  .empty-val { color: var(--muted); font-size: 15px; padding: 10px 14px; background: var(--bg3); border-radius: var(--radius); }
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <div class="logo">C</div>
    <div>
      <h1>경쟁사 모니터링</h1>
      <div class="header-meta" id="last-run-text">로딩 중...</div>
    </div>
  </div>
  <div class="header-actions">
    <div class="view-toggle">
      <button class="view-btn active" onclick="setView('today')" id="view-today">오늘 현황</button>
      <button class="view-btn" onclick="setView('history')" id="view-history">히스토리</button>
    </div>
    <button class="btn btn-ghost" onclick="loadData()" id="refresh-btn">새로고침</button>
    <button class="btn btn-icon btn-ghost" onclick="toggleTheme()" id="theme-btn" title="다크/라이트 모드">🌙</button>
    <button class="btn btn-primary" onclick="triggerRun()" id="run-btn">지금 실행</button>
  </div>
</header>

<main class="main" id="main-content">
  <div class="empty"><div class="spinner"></div><p style="margin-top:14px">로딩 중...</p></div>
</main>

<div id="toast"></div>

<script>
let currentView = 'today';
let latestData = null;
let historyData = [];
let selectedCompetitor = null;
let isDark = true;
let hasBackend = false; // 로컬 서버(node server.js)에서 열렸는지 여부 → "지금 실행" 가능 여부

function toggleTheme() {
  isDark = !isDark;
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  document.getElementById('theme-btn').textContent = isDark ? '🌙' : '☀️';
  localStorage.setItem('theme', isDark ? 'dark' : 'light');
}

// 저장된 테마 복원
(function() {
  const saved = localStorage.getItem('theme');
  if (saved === 'light') {
    isDark = false;
    document.documentElement.setAttribute('data-theme', 'light');
    document.addEventListener('DOMContentLoaded', () => {
      const btn = document.getElementById('theme-btn');
      if (btn) btn.textContent = '☀️';
    });
  }
})();

function setView(view) {
  currentView = view;
  document.getElementById('view-today').classList.toggle('active', view === 'today');
  document.getElementById('view-history').classList.toggle('active', view === 'history');
  render();
}

// 정적 JSON 파일을 직접 읽음 (Cloudflare Pages·로컬 둘 다 동일하게 동작).
// 캐시 때문에 옛 데이터가 보이지 않도록 매번 새로 가져온다.
async function fetchJson(url) {
  const res = await fetch(url + '?t=' + Date.now(), { cache: 'no-store' });
  if (!res.ok) throw new Error(url + ' (' + res.status + ')');
  return res.json();
}

async function loadData() {
  setRefreshing(true);
  try {
    const [latest, history] = await Promise.all([
      fetchJson('./data/latest.json').catch(() => ({ empty: true, competitors: [] })),
      fetchJson('./data/history.json').catch(() => []),
    ]);
    latestData = latest;
    historyData = Array.isArray(history) ? history : [];

    if (latestData?.createdAt) {
      const d = new Date(latestData.createdAt);
      document.getElementById('last-run-text').textContent =
        `마지막 업데이트: ${d.toLocaleDateString('ko-KR')} ${d.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' })}`;
    } else {
      document.getElementById('last-run-text').textContent = '아직 수집 전';
    }
    if (!selectedCompetitor && latestData?.competitors?.length > 0) {
      selectedCompetitor = latestData.competitors[0].id;
    }
    render();
  } catch (e) {
    showToast('데이터 로드 실패: ' + e.message);
  } finally {
    setRefreshing(false);
  }
}

// 로컬 서버에서 열렸는지 확인 → 아니면 "지금 실행" 버튼 숨김(Cloudflare에선 자동 수집이므로)
async function detectBackend() {
  try {
    const res = await fetch('/api/status', { cache: 'no-store' });
    hasBackend = res.ok && (await res.json()).local === true;
  } catch { hasBackend = false; }
  const runBtn = document.getElementById('run-btn');
  if (runBtn) runBtn.style.display = hasBackend ? '' : 'none';
}

function setRefreshing(on) {
  const btn = document.getElementById('refresh-btn');
  btn.innerHTML = on ? '<span class="spinner"></span>' : '새로고침';
  btn.disabled = on;
}

async function triggerRun() {
  const btn = document.getElementById('run-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner" style="width:13px;height:13px"></span> 실행 중...';
  try {
    await fetch('/api/run', { method: 'POST' });
    showToast('크롤링 & 분석 시작! 1~2분 후 새로고침 하세요.');
    setTimeout(() => loadData(), 90000);
  } catch (e) {
    showToast('실행 실패: ' + e.message);
  } finally {
    setTimeout(() => {
      btn.disabled = false;
      btn.textContent = '지금 실행';
    }, 5000);
  }
}

function render() {
  if (currentView === 'today') renderToday();
  else renderHistory();
}

function renderToday() {
  const el = document.getElementById('main-content');
  if (!latestData || latestData.empty) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">📡</div><p>아직 수집된 데이터가 없습니다.</p><p style="margin-top:8px;font-size:12px">상단 <strong>지금 실행</strong> 버튼을 눌러 첫 모니터링을 시작하세요.</p></div>`;
    return;
  }

  const competitors = latestData.competitors || [];
  const date = new Date(latestData.createdAt).toLocaleDateString('ko-KR', { month: 'long', day: 'numeric', weekday: 'short' });
  const current = competitors.find(c => c.id === selectedCompetitor) || competitors[0];

  el.innerHTML = `
    <p class="section-title">${date} 기준 · 경쟁사 ${competitors.length}개</p>
    <div class="summary-grid">
      ${competitors.map(c => `
        <div class="summary-card ${c.analysis.urgency === 'high' ? 'urgent' : ''} ${c.id === current?.id ? 'active-card' : ''}"
             onclick="selectCompetitor('${c.id}')">
          <div class="summary-name">${escHtml(c.name)} ${urgencyBadge(c.analysis.urgency)}</div>
          <div class="summary-text">${escHtml(c.analysis.summary || '분석 없음')}</div>
          ${c.analysis.promotions?.length > 0 ? `<div class="promo-count">프로모션 ${c.analysis.promotions.length}건</div>` : ''}
        </div>
      `).join('')}
    </div>
    ${competitors.length > 1 ? `
    <div class="tabs">
      ${competitors.map(c => `
        <button class="tab ${c.id === current?.id ? 'active' : ''}" onclick="selectCompetitor('${c.id}')">
          ${urgencyDot(c.analysis.urgency)} ${escHtml(c.name)}
        </button>
      `).join('')}
    </div>` : ''}
    ${current ? renderDetail(current) : ''}
  `;
}

function selectCompetitor(id) {
  selectedCompetitor = id;
  renderToday();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderDetail(c) {
  const a = c.analysis;
  const crawledAt = c.crawl?.crawledAt
    ? new Date(c.crawl.crawledAt).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' })
    : '-';

  return `
    <div class="detail-card">
      <div class="detail-header">
        <div>
          <div class="detail-name">${escHtml(c.name)}</div>
          <div class="detail-meta">
            <a href="${escHtml(c.url)}" target="_blank">${escHtml(c.url)}</a>
            &nbsp;·&nbsp; 수집 ${crawledAt}
            ${c.crawl?.success === false ? '&nbsp;·&nbsp;<span style="color:var(--red)">크롤링 실패</span>' : ''}
          </div>
        </div>
        <div class="urgency-block">
          ${urgencyBadge(a.urgency)}
          ${a.urgencyReason ? `<div class="urgency-reason">${escHtml(a.urgencyReason)}</div>` : ''}
        </div>
      </div>

      <div class="summary-box">${escHtml(a.summary || '요약 없음')}</div>

      <div class="analysis-grid">
        <div class="col-promo">
          <p class="section-title">🎯 감지된 프로모션</p>
          ${a.promotions?.length > 0
            ? `<div class="item-list">${a.promotions.map(p => `
                <div class="item item-medium">
                  <div class="item-title">${escHtml(p.title)}</div>
                  <div class="item-detail">${escHtml(p.detail)}</div>
                  ${p.period ? `<div class="item-meta">📅 ${escHtml(p.period)}</div>` : ''}
                </div>`).join('')}</div>`
            : `<div class="empty-val">특이 프로모션 없음</div>`}
        </div>
        <div class="col-reco">
          <p class="section-title">💡 점주 대응방안</p>
          ${a.recommendations?.length > 0
            ? `<div class="item-list">${a.recommendations.map(r => `
                <div class="item item-${r.priority || 'medium'}">
                  <div class="item-header">
                    <div class="item-title">${escHtml(r.action)}</div>
                    ${urgencyBadge(r.priority || 'medium')}
                  </div>
                  <div class="item-detail">${escHtml(r.detail)}</div>
                </div>`).join('')}</div>`
            : `<div class="empty-val">대응방안 없음</div>`}
        </div>
      </div>

      <hr class="divider">
      <div class="changes-section">
        <p class="section-title">🔄 변경사항</p>
        ${a.changes?.length > 0
          ? `<div class="item-list">${a.changes.map(ch => `
              <div class="item item-default">
                <div class="item-title">${escHtml(ch.type)}</div>
                <div class="item-detail">${escHtml(ch.description)}</div>
              </div>`).join('')}</div>`
          : `<div class="empty-val">전일 대비 변경 없음</div>`}
      </div>
    </div>`;
}

function renderHistory() {
  const el = document.getElementById('main-content');
  if (!historyData?.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">📅</div><p>히스토리가 없습니다.</p></div>`;
    return;
  }
  el.innerHTML = `
    <p class="section-title">최근 ${historyData.length}일 히스토리</p>
    <div class="history-list">
      ${historyData.map(r => `
        <div class="history-item" onclick="loadHistoryDate('${r.date}')">
          <div>
            <div style="font-size:16px;font-weight:700">${formatDate(r.date)}</div>
            <div style="font-size:14px;color:var(--muted);margin-top:4px">
              ${r.competitors.map(c => `${escHtml(c.name)}: ${escHtml(c.analysis?.summary || '-')}`).join(' &nbsp;·&nbsp; ')}
            </div>
          </div>
          <div style="display:flex;gap:4px;flex-shrink:0">
            ${r.competitors.map(c => urgencyBadge(c.analysis?.urgency)).join('')}
          </div>
        </div>`).join('')}
    </div>`;
}

// 이미 로드한 history.json(전체 레코드)에서 해당 날짜를 찾아 표시
function loadHistoryDate(date) {
  const data = historyData.find(r => r.date === date);
  if (!data) { showToast('해당 날짜 데이터 없음'); return; }
  latestData = data;
  selectedCompetitor = data.competitors?.[0]?.id;
  setView('today');
}

function urgencyBadge(u) {
  const map = { high: ['badge-high','긴급'], medium: ['badge-medium','주의'], low: ['badge-low','안정'] };
  const [cls, label] = map[u] || map.low;
  return `<span class="badge ${cls}"><span class="dot"></span>${label}</span>`;
}

function urgencyDot(u) {
  const colors = { high: 'var(--red)', medium: 'var(--amber)', low: 'var(--green)' };
  return `<span style="width:6px;height:6px;border-radius:50%;background:${colors[u]||colors.low};display:inline-block;flex-shrink:0"></span>`;
}

function escHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatDate(d) {
  return new Date(d).toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric', weekday:'short' });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
