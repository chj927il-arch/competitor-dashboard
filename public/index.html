<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>경쟁사 모니터링 대시보드</title>
<style>
  :root {
    --bg: #f5f6f9; --surface: #ffffff; --surface2: #f8fafc;
    --border: #e7e9ef; --border-strong: #d8dce4;
    --text: #0f172a; --text2: #334155; --muted: #74809a;
    --accent: #4f46e5; --accent2: #6366f1; --accent-soft: #eef0fe;
    --red: #e11d48; --amber: #d97706; --green: #059669;
    --red-soft: #fef2f4; --amber-soft: #fef6ec; --green-soft: #ecfdf5;
    --radius: 12px; --radius-sm: 9px;
    --shadow-sm: 0 1px 2px rgba(15,23,42,.06), 0 1px 3px rgba(15,23,42,.04);
    --shadow: 0 4px 16px rgba(15,23,42,.07);
    --sidebar-w: 268px;
  }
  [data-theme="dark"] {
    --bg: #0b0e16; --surface: #131826; --surface2: #1a2031;
    --border: #232a3b; --border-strong: #2e3650;
    --text: #eef1f8; --text2: #c4cbdc; --muted: #8590a8;
    --accent: #6366f1; --accent2: #818cf8; --accent-soft: #1e2540;
    --red: #fb7185; --amber: #fbbf24; --green: #34d399;
    --red-soft: #2a1620; --amber-soft: #261d10; --green-soft: #11241d;
    --shadow-sm: 0 1px 2px rgba(0,0,0,.3);
    --shadow: 0 8px 28px rgba(0,0,0,.45);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Pretendard','Apple SD Gothic Neo','Noto Sans KR',-apple-system,sans-serif;
    font-size: 15px; line-height: 1.6; min-height: 100vh;
    -webkit-font-smoothing: antialiased; transition: background .2s, color .2s;
  }

  .app { display: flex; min-height: 100vh; }

  /* ── 사이드바 ── */
  .sidebar {
    width: var(--sidebar-w); flex-shrink: 0; background: var(--surface);
    border-right: 1px solid var(--border); padding: 22px 16px;
    display: flex; flex-direction: column; gap: 22px;
    position: sticky; top: 0; height: 100vh; overflow-y: auto;
  }
  .brand { display: flex; align-items: center; gap: 11px; padding: 0 6px; }
  .brand-logo { width: 38px; height: 38px; border-radius: 10px; background: linear-gradient(135deg,var(--accent),var(--accent2)); display: grid; place-items: center; color: #fff; font-weight: 800; font-size: 18px; flex-shrink: 0; }
  .brand-title { font-size: 16px; font-weight: 700; line-height: 1.25; }
  .brand-sub { font-size: 11.5px; color: var(--muted); }

  .nav { display: flex; flex-direction: column; gap: 3px; }
  .nav-label { font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: .06em; text-transform: uppercase; padding: 0 8px; margin-bottom: 6px; }
  .nav-btn { display: flex; align-items: center; gap: 10px; padding: 9px 11px; border: none; background: transparent; color: var(--text2); font-size: 14px; font-weight: 500; border-radius: var(--radius-sm); cursor: pointer; text-align: left; width: 100%; transition: background .12s, color .12s; }
  .nav-btn:hover { background: var(--surface2); color: var(--text); }
  .nav-btn.active { background: var(--accent-soft); color: var(--accent2); font-weight: 600; }
  .nav-btn .ic { font-size: 16px; }

  .comp-list { display: flex; flex-direction: column; gap: 4px; }
  .comp-item { display: flex; align-items: center; gap: 9px; padding: 10px 11px; border-radius: var(--radius-sm); cursor: pointer; border: 1px solid transparent; transition: background .12s, border-color .12s; }
  .comp-item:hover { background: var(--surface2); }
  .comp-item.active { background: var(--accent-soft); border-color: var(--accent); }
  .comp-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .comp-name { font-size: 14px; font-weight: 600; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .sidebar-foot { margin-top: auto; display: flex; flex-direction: column; gap: 10px; padding-top: 14px; border-top: 1px solid var(--border); }
  .last-run { font-size: 12px; color: var(--muted); padding: 0 6px; }
  .foot-actions { display: flex; gap: 7px; }

  /* ── 버튼 ── */
  .btn { padding: 8px 13px; border-radius: var(--radius-sm); border: 1px solid var(--border-strong); background: var(--surface); color: var(--text2); font-size: 13px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 6px; transition: all .12s; }
  .btn:hover { border-color: var(--accent); color: var(--accent2); }
  .btn:active { transform: scale(.97); }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent2); border-color: var(--accent2); color: #fff; }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .btn-block { flex: 1; }

  /* ── 본문 ── */
  .content { flex: 1; min-width: 0; padding: 30px 36px 48px; max-width: 1300px; }
  .page-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
  .page-title { font-size: 25px; font-weight: 800; letter-spacing: -.02em; }
  .page-sub { font-size: 13.5px; color: var(--muted); margin-top: 3px; }

  /* ── KPI 카드 ── */
  .kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 28px; }
  .kpi { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; box-shadow: var(--shadow-sm); }
  .kpi-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .kpi-label { font-size: 13px; color: var(--muted); font-weight: 600; }
  .kpi-icon { width: 34px; height: 34px; border-radius: 9px; display: grid; place-items: center; font-size: 17px; }
  .kpi-value { font-size: 32px; font-weight: 800; line-height: 1; letter-spacing: -.02em; }
  .kpi-foot { font-size: 12.5px; color: var(--muted); margin-top: 8px; }
  .kpi.alert .kpi-value { color: var(--red); }

  /* ── 상세 카드 ── */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow-sm); }
  .detail-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 18px; padding: 24px 26px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .detail-name { font-size: 23px; font-weight: 800; letter-spacing: -.01em; display: flex; align-items: center; gap: 10px; }
  .detail-meta { font-size: 13px; color: var(--muted); margin-top: 5px; }
  .detail-meta a { color: var(--accent2); text-decoration: none; }
  .detail-meta a:hover { text-decoration: underline; }
  .urgency-block { text-align: right; }
  .urgency-reason { font-size: 12.5px; color: var(--muted); max-width: 280px; margin-top: 6px; line-height: 1.5; }

  .detail-body { padding: 24px 26px; }
  .summary-box { background: linear-gradient(180deg,var(--accent-soft),transparent); border: 1px solid var(--border); border-left: 4px solid var(--accent); border-radius: var(--radius-sm); padding: 18px 20px; font-size: 16px; font-weight: 500; line-height: 1.6; color: var(--text); margin-bottom: 26px; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; }
  @media (max-width: 900px) { .grid-2 { grid-template-columns: 1fr; } }

  .col-head { display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 700; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 2px solid var(--border); }
  .col-head .ic { font-size: 17px; }
  .col-promo .col-head { border-color: var(--amber); }
  .col-reco .col-head { border-color: var(--accent); }
  .col-count { margin-left: auto; font-size: 12px; font-weight: 700; color: var(--muted); background: var(--surface2); padding: 2px 9px; border-radius: 20px; }

  .item-list { display: flex; flex-direction: column; gap: 11px; }
  .item { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); border-left: 4px solid var(--border-strong); padding: 15px 17px; }
  .item-high { border-left-color: var(--red); }
  .item-medium { border-left-color: var(--amber); }
  .item-low { border-left-color: var(--green); }
  .item-promo { border-left-color: var(--amber); }
  .item-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
  .item-title { font-size: 15.5px; font-weight: 700; line-height: 1.4; }
  .item-detail { font-size: 14.5px; color: var(--text2); line-height: 1.62; }
  .item-period { display: inline-flex; align-items: center; gap: 5px; font-size: 12.5px; color: var(--muted); margin-top: 9px; background: var(--surface); border: 1px solid var(--border); padding: 3px 9px; border-radius: 6px; }

  .changes-block { margin-top: 26px; padding-top: 24px; border-top: 1px solid var(--border); }

  /* ── 뱃지 ── */
  .badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 11px; border-radius: 20px; font-size: 12.5px; font-weight: 700; white-space: nowrap; }
  .badge .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .badge-high { background: var(--red-soft); color: var(--red); }
  .badge-medium { background: var(--amber-soft); color: var(--amber); }
  .badge-low { background: var(--green-soft); color: var(--green); }

  /* ── 히스토리 ── */
  .history-list { display: flex; flex-direction: column; gap: 10px; }
  .history-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 20px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; gap: 14px; box-shadow: var(--shadow-sm); transition: border-color .12s, transform .08s; }
  .history-item:hover { border-color: var(--accent); transform: translateX(2px); }
  .history-date { font-size: 16px; font-weight: 700; }
  .history-sum { font-size: 13.5px; color: var(--muted); margin-top: 3px; }

  /* ── 상태 ── */
  .empty { text-align: center; padding: 80px 24px; color: var(--muted); }
  .empty-icon { font-size: 48px; margin-bottom: 16px; }
  .empty-val { color: var(--muted); font-size: 14.5px; padding: 14px 16px; background: var(--surface2); border: 1px dashed var(--border-strong); border-radius: var(--radius-sm); text-align: center; }
  .spinner { width: 20px; height: 20px; border: 2.5px solid var(--border-strong); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  #toast { position: fixed; bottom: 24px; right: 24px; z-index: 999; background: var(--text); color: var(--surface); padding: 12px 18px; border-radius: var(--radius-sm); font-size: 13.5px; font-weight: 500; box-shadow: var(--shadow); opacity: 0; transform: translateY(10px); transition: all .25s; pointer-events: none; }
  #toast.show { opacity: 1; transform: translateY(0); }
  .crawl-fail { background: var(--red-soft); color: var(--red); border-radius: var(--radius-sm); padding: 11px 15px; font-size: 13.5px; font-weight: 600; margin-bottom: 18px; }

  /* ── 반응형 (모바일: 사이드바를 상단으로) ── */
  @media (max-width: 760px) {
    .app { flex-direction: column; }
    .sidebar { width: 100%; height: auto; position: static; flex-direction: column; border-right: none; border-bottom: 1px solid var(--border); }
    .sidebar-foot { margin-top: 0; }
    .content { padding: 22px 18px 40px; }
    .page-title { font-size: 22px; }
  }
</style>
</head>
<body>

<div class="app">
  <!-- 사이드바 -->
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-logo">잇</div>
      <div>
        <div class="brand-title">경쟁사 모니터링</div>
        <div class="brand-sub">이투스 ECI · 마케팅 인텔리전스</div>
      </div>
    </div>

    <nav class="nav">
      <div class="nav-label">메뉴</div>
      <button class="nav-btn active" id="nav-today" onclick="setView('today')"><span class="ic">📊</span> 오늘 현황</button>
      <button class="nav-btn" id="nav-history" onclick="setView('history')"><span class="ic">🗓️</span> 히스토리</button>
    </nav>

    <div class="nav">
      <div class="nav-label">경쟁사</div>
      <div class="comp-list" id="comp-list"></div>
    </div>

    <div class="sidebar-foot">
      <div class="last-run" id="last-run-text">로딩 중...</div>
      <div class="foot-actions">
        <button class="btn btn-block" onclick="loadData()" id="refresh-btn">새로고침</button>
        <button class="btn" onclick="toggleTheme()" id="theme-btn" title="다크/라이트 모드">🌙</button>
      </div>
      <button class="btn btn-primary btn-block" onclick="triggerRun()" id="run-btn" style="display:none">지금 실행</button>
    </div>
  </aside>

  <!-- 본문 -->
  <main class="content" id="content">
    <div class="empty"><div class="spinner"></div><p style="margin-top:16px">데이터를 불러오는 중...</p></div>
  </main>
</div>

<div id="toast"></div>

<script>
let currentView = 'today';
let latestData = null;
let historyData = [];
let selectedCompetitor = null;
let isDark = false;
let hasBackend = false;

function toggleTheme() {
  isDark = !isDark;
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  document.getElementById('theme-btn').textContent = isDark ? '🌙' : '☀️';
  localStorage.setItem('theme', isDark ? 'dark' : 'light');
}
(function() {
  const saved = localStorage.getItem('theme');
  isDark = saved === 'dark';
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  document.addEventListener('DOMContentLoaded', () => {
    const btn = document.getElementById('theme-btn');
    if (btn) btn.textContent = isDark ? '🌙' : '☀️';
  });
})();

function setView(view) {
  currentView = view;
  document.getElementById('nav-today').classList.toggle('active', view === 'today');
  document.getElementById('nav-history').classList.toggle('active', view === 'history');
  render();
}

async function fetchJson(url) {
  const res = await fetch(url + '?t=' + Date.now(), { cache: 'no-store' });
  if (!res.ok) throw new Error(url + ' (' + res.status + ')');
  return res.json();
}

async function loadData() {
  setRefreshing(true);
  try {
    const [latest, history] = await Promise.all([
      fetchJson('./data/latest.json').catch(() => ({ empty: true, competitors: [] })),
      fetchJson('./data/history.json').catch(() => []),
    ]);
    latestData = latest;
    historyData = Array.isArray(history) ? history : [];

    if (latestData?.createdAt) {
      const d = new Date(latestData.createdAt);
      document.getElementById('last-run-text').innerHTML =
        `🕒 마지막 업데이트<br>${d.toLocaleDateString('ko-KR')} ${d.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' })}`;
    } else {
      document.getElementById('last-run-text').textContent = '아직 수집 전';
    }
    if (!selectedCompetitor && latestData?.competitors?.length > 0) {
      selectedCompetitor = latestData.competitors[0].id;
    }
    renderSidebarCompetitors();
    render();
  } catch (e) {
    showToast('데이터 로드 실패: ' + e.message);
  } finally {
    setRefreshing(false);
  }
}

async function detectBackend() {
  try {
    const res = await fetch('/api/status', { cache: 'no-store' });
    hasBackend = res.ok && (await res.json()).local === true;
  } catch { hasBackend = false; }
  const runBtn = document.getElementById('run-btn');
  if (runBtn) runBtn.style.display = hasBackend ? '' : 'none';
}

function setRefreshing(on) {
  const btn = document.getElementById('refresh-btn');
  btn.innerHTML = on ? '<span class="spinner" style="width:14px;height:14px;border-width:2px"></span>' : '새로고침';
  btn.disabled = on;
}

async function triggerRun() {
  const btn = document.getElementById('run-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner" style="width:13px;height:13px;border-width:2px"></span> 실행 중...';
  try {
    await fetch('/api/run', { method: 'POST' });
    showToast('크롤링 & 분석 시작! 1~2분 후 새로고침 하세요.');
    setTimeout(() => loadData(), 90000);
  } catch (e) {
    showToast('실행 실패: ' + e.message);
  } finally {
    setTimeout(() => { btn.disabled = false; btn.textContent = '지금 실행'; }, 5000);
  }
}

// ── 사이드바 경쟁사 목록 ──
function renderSidebarCompetitors() {
  const el = document.getElementById('comp-list');
  const comps = latestData?.competitors || [];
  if (!comps.length) { el.innerHTML = `<div style="font-size:13px;color:var(--muted);padding:6px 8px">없음</div>`; return; }
  el.innerHTML = comps.map(c => `
    <div class="comp-item ${c.id === selectedCompetitor ? 'active' : ''}" onclick="selectCompetitor('${c.id}')">
      <span class="comp-dot" style="background:${urgencyColor(c.analysis?.urgency)}"></span>
      <span class="comp-name">${escHtml(c.name)}</span>
      ${urgencyBadge(c.analysis?.urgency)}
    </div>`).join('');
}

function selectCompetitor(id) {
  selectedCompetitor = id;
  if (currentView !== 'today') currentView = 'today', setView('today');
  renderSidebarCompetitors();
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function render() {
  if (currentView === 'today') renderToday();
  else renderHistory();
}

// ── 오늘 현황 ──
function renderToday() {
  const el = document.getElementById('content');
  if (!latestData || latestData.empty || !(latestData.competitors||[]).length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">📡</div><p>아직 수집된 데이터가 없습니다.</p><p style="margin-top:8px;font-size:13px">매일 오전 8시에 자동으로 수집됩니다.</p></div>`;
    return;
  }
  const comps = latestData.competitors;
  const current = comps.find(c => c.id === selectedCompetitor) || comps[0];
  const dateStr = new Date(latestData.createdAt).toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric', weekday:'short' });

  const highCnt = comps.filter(c => c.analysis?.urgency === 'high').length;
  const promoTotal = comps.reduce((s,c) => s + (c.analysis?.promotions?.length || 0), 0);
  const recoTotal = comps.reduce((s,c) => s + (c.analysis?.recommendations?.length || 0), 0);

  el.innerHTML = `
    <div class="page-head">
      <div>
        <div class="page-title">오늘 현황</div>
        <div class="page-sub">${dateStr} 기준</div>
      </div>
    </div>

    <div class="kpis">
      <div class="kpi">
        <div class="kpi-top"><span class="kpi-label">모니터링 경쟁사</span><span class="kpi-icon" style="background:var(--accent-soft);color:var(--accent2)">🏢</span></div>
        <div class="kpi-value">${comps.length}<span style="font-size:16px;font-weight:600;color:var(--muted)"> 개사</span></div>
      </div>
      <div class="kpi ${highCnt ? 'alert' : ''}">
        <div class="kpi-top"><span class="kpi-label">긴급 대응 필요</span><span class="kpi-icon" style="background:var(--red-soft);color:var(--red)">🚨</span></div>
        <div class="kpi-value">${highCnt}<span style="font-size:16px;font-weight:600;color:var(--muted)"> 곳</span></div>
        <div class="kpi-foot">긴급도 'high' 경쟁사</div>
      </div>
      <div class="kpi">
        <div class="kpi-top"><span class="kpi-label">감지된 프로모션</span><span class="kpi-icon" style="background:var(--amber-soft);color:var(--amber)">🎯</span></div>
        <div class="kpi-value">${promoTotal}<span style="font-size:16px;font-weight:600;color:var(--muted)"> 건</span></div>
      </div>
      <div class="kpi">
        <div class="kpi-top"><span class="kpi-label">점주 대응방안</span><span class="kpi-icon" style="background:var(--accent-soft);color:var(--accent2)">💡</span></div>
        <div class="kpi-value">${recoTotal}<span style="font-size:16px;font-weight:600;color:var(--muted)"> 건</span></div>
      </div>
    </div>

    ${current ? renderDetail(current) : ''}
  `;
}

function renderDetail(c) {
  const a = c.analysis || {};
  const crawledAt = c.crawl?.crawledAt
    ? new Date(c.crawl.crawledAt).toLocaleString('ko-KR', { month:'long', day:'numeric', hour:'2-digit', minute:'2-digit' })
    : '-';
  return `
    <div class="card">
      <div class="detail-head">
        <div>
          <div class="detail-name">${escHtml(c.name)}</div>
          <div class="detail-meta">
            <a href="${escHtml(c.url)}" target="_blank">${escHtml(c.url)}</a> · 수집 ${crawledAt}
            ${c.crawl?.success === false ? ' · <span style="color:var(--red)">크롤링 실패</span>' : ''}
          </div>
        </div>
        <div class="urgency-block">
          ${urgencyBadge(a.urgency, true)}
          ${a.urgencyReason ? `<div class="urgency-reason">${escHtml(a.urgencyReason)}</div>` : ''}
        </div>
      </div>
      <div class="detail-body">
        ${c.crawl?.success === false ? `<div class="crawl-fail">⚠️ 크롤링에 실패해 분석 정확도가 낮을 수 있습니다.</div>` : ''}
        <div class="summary-box">${escHtml(a.summary || '요약 없음')}</div>

        <div class="grid-2">
          <div class="col-promo">
            <div class="col-head"><span class="ic">🎯</span> 감지된 프로모션 <span class="col-count">${a.promotions?.length || 0}</span></div>
            ${a.promotions?.length ? `<div class="item-list">${a.promotions.map(p => `
              <div class="item item-promo">
                <div class="item-title">${escHtml(p.title)}</div>
                <div class="item-detail">${escHtml(p.detail)}</div>
                ${p.period ? `<div class="item-period">📅 ${escHtml(p.period)}</div>` : ''}
              </div>`).join('')}</div>` : `<div class="empty-val">특이 프로모션 없음</div>`}
          </div>
          <div class="col-reco">
            <div class="col-head"><span class="ic">💡</span> 점주 대응방안 <span class="col-count">${a.recommendations?.length || 0}</span></div>
            ${a.recommendations?.length ? `<div class="item-list">${a.recommendations.map(r => `
              <div class="item item-${r.priority || 'medium'}">
                <div class="item-head"><div class="item-title">${escHtml(r.action)}</div>${urgencyBadge(r.priority || 'medium')}</div>
                <div class="item-detail">${escHtml(r.detail)}</div>
              </div>`).join('')}</div>` : `<div class="empty-val">대응방안 없음</div>`}
          </div>
        </div>

        <div class="changes-block">
          <div class="col-head"><span class="ic">🔄</span> 변경사항 <span class="col-count">${a.changes?.length || 0}</span></div>
          ${a.changes?.length ? `<div class="item-list">${a.changes.map(ch => `
            <div class="item">
              <div class="item-title">${escHtml(ch.type)}</div>
              <div class="item-detail">${escHtml(ch.description)}</div>
            </div>`).join('')}</div>` : `<div class="empty-val">전일 대비 변경 없음</div>`}
        </div>
      </div>
    </div>`;
}

// ── 히스토리 ──
function renderHistory() {
  const el = document.getElementById('content');
  el.innerHTML = `
    <div class="page-head"><div><div class="page-title">히스토리</div><div class="page-sub">최근 ${historyData.length}일 수집 이력</div></div></div>
    ${!historyData.length
      ? `<div class="empty"><div class="empty-icon">🗓️</div><p>히스토리가 없습니다.</p></div>`
      : `<div class="history-list">${historyData.map(r => `
          <div class="history-item" onclick="loadHistoryDate('${r.date}')">
            <div>
              <div class="history-date">${formatDate(r.date)}</div>
              <div class="history-sum">${r.competitors.map(c => `${escHtml(c.name)}: ${escHtml(c.analysis?.summary || '-')}`).join(' · ')}</div>
            </div>
            <div style="display:flex;gap:5px;flex-shrink:0">${r.competitors.map(c => urgencyBadge(c.analysis?.urgency)).join('')}</div>
          </div>`).join('')}</div>`}
  `;
}

function loadHistoryDate(date) {
  const data = historyData.find(r => r.date === date);
  if (!data) { showToast('해당 날짜 데이터 없음'); return; }
  latestData = data;
  selectedCompetitor = data.competitors?.[0]?.id;
  renderSidebarCompetitors();
  setView('today');
  showToast(formatDate(date) + ' 기록을 표시합니다');
}

// ── 헬퍼 ──
function urgencyColor(u) { return ({ high:'var(--red)', medium:'var(--amber)', low:'var(--green)' })[u] || 'var(--green)'; }
function urgencyBadge(u, big) {
  const map = { high: ['badge-high','긴급'], medium: ['badge-medium','주의'], low: ['badge-low','안정'] };
  const [cls, label] = map[u] || map.low;
  return `<span class="badge ${cls}" ${big ? 'style="font-size:13.5px;padding:6px 13px"' : ''}><span class="dot"></span>${label}</span>`;
}
function escHtml(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function formatDate(d) { return new Date(d).toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric', weekday:'short' }); }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

detectBackend();
loadData();
</script>
</body>
</html>
